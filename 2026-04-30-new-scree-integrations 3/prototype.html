<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Studio · Awsales — Protótipo Integrações + Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Architects+Daughter&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f1e8;
  --paper: #fdfaf3;
  --paper2: #f9f4ea;
  --ink: #1a1a1a;
  --ink-soft: #2a2a2a;
  --line: #1a1a1a;
  --muted: #6b6b6b;
  --muted2: #8b8580;
  --green: #2f7a35;
  --green-bg: #d4ebd4;
  --green-soft: #c8e0c8;
  --yellow: #b8870e;
  --yellow-bg: #f8e5a8;
  --red: #b03838;
  --red-bg: #f5d4d4;
  --blue: #3257b8;
  --blue-bg: #d4dff5;
  --orange: #c46818;
  --shadow-sm: 1px 1px 0 rgba(0,0,0,0.08);
  --shadow-md: 2px 2px 0 rgba(0,0,0,0.12);
  --shadow-lg: 3px 3px 0 rgba(0,0,0,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Patrick Hand', 'Architects Daughter', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.4;
}

h1, h2, h3, .script {
  font-family: 'Caveat', cursive;
  font-weight: 600;
  color: var(--ink);
}

button, input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ======================================================================
   LAYOUT
   ====================================================================== */

#app {
  display: flex;
  min-height: 100vh;
}

.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--bg);
  border-bottom: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.topbar .brand {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  font-weight: 600;
}

.topbar .org-switcher {
  border: 1.5px solid var(--line);
  border-radius: 18px;
  padding: 4px 14px;
  font-size: 14px;
  cursor: pointer;
  background: var(--paper);
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
}

.topbar .org-switcher .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
  display: none;
}
.topbar .org-switcher.dirty .dot { display: block; }

.sidebar {
  width: 200px;
  background: var(--bg);
  border-right: 1.5px solid var(--line);
  padding: 76px 0 16px 0;
  position: fixed;
  top: 0; bottom: 0;
  overflow-y: auto;
}

.sidebar nav {
  padding: 0 16px;
}

.sidebar nav .item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 4px;
  color: var(--ink-soft);
  margin-bottom: 2px;
}
.sidebar nav .item:hover {
  background: var(--paper);
}
.sidebar nav .item.active {
  font-weight: 600;
}
.sidebar nav .item .arrow {
  font-size: 10px;
  color: var(--muted);
}
.sidebar nav .sub {
  padding-left: 18px;
  font-size: 14px;
  color: var(--muted);
  margin-top: 2px;
  margin-bottom: 4px;
}
.sidebar nav .sub.active { color: var(--ink); font-weight: 600; }

.main {
  margin-left: 200px;
  padding: 76px 32px 48px 32px;
  flex: 1;
  min-width: 0;
}

.page {
  max-width: 1200px;
}

.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}

.page-header h1 {
  font-family: 'Caveat', cursive;
  font-size: 38px;
  font-weight: 600;
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.page-header h1 .meta {
  font-family: 'Patrick Hand', sans-serif;
  font-size: 15px;
  color: var(--muted);
  font-weight: 400;
}

.note {
  font-family: 'Architects Daughter', cursive;
  color: var(--muted);
  font-size: 13px;
  font-style: italic;
  margin: 6px 0;
}

/* ======================================================================
   COMPONENTES
   ====================================================================== */

.btn {
  border: 1.5px solid var(--line);
  background: var(--ink);
  color: var(--paper);
  padding: 8px 16px;
  border-radius: 22px;
  cursor: pointer;
  font-size: 15px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.05s;
}
.btn:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow-md); }
.btn:active { transform: translate(1px, 1px); box-shadow: none; }

.btn.secondary {
  background: var(--paper);
  color: var(--ink);
}

.btn.ghost {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--line);
  box-shadow: none;
}

.btn.danger {
  background: var(--red);
  color: var(--paper);
  border-color: var(--red);
}

.btn.small {
  padding: 4px 10px;
  font-size: 13px;
  border-radius: 16px;
}

.btn-link {
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--blue);
  text-decoration: underline;
  padding: 0;
  font-size: 14px;
}

.btn-icon {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 14px;
}

.input, .textarea, .select {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 15px;
  width: 100%;
  font-family: inherit;
}

.textarea {
  min-height: 100px;
  resize: vertical;
}

.search {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 26px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.search input {
  border: none;
  background: transparent;
  outline: none;
  flex: 1;
  font-size: 15px;
}

.toggle-view {
  border: 1.5px solid var(--line);
  border-radius: 6px;
  display: flex;
  background: var(--paper);
}
.toggle-view button {
  padding: 6px 10px;
  background: transparent;
  border: none;
  cursor: pointer;
}
.toggle-view button.active {
  background: var(--ink);
  color: var(--paper);
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 10px;
  border-radius: 12px;
  border: 1.5px solid var(--line);
  font-size: 13px;
  background: var(--paper);
}

.chip.green { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.chip.yellow { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
.chip.red { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.chip.blue { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }

.dot-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.dot-status.green { background: var(--green); }
.dot-status.yellow { background: var(--yellow); }
.dot-status.red { background: var(--red); }
.dot-status.gray { background: var(--muted); }
.dot-status.blue { background: var(--blue); }

.notif-badge {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--red);
  color: white;
  border: 1.5px solid var(--paper);
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}

.banner {
  background: var(--blue-bg);
  border: 1.5px solid var(--blue);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.banner.warning { background: var(--yellow-bg); border-color: var(--yellow); }
.banner.error { background: var(--red-bg); border-color: var(--red); }
.banner.success { background: var(--green-bg); border-color: var(--green); }

.banner .text { flex: 1; }
.banner .icon { font-size: 18px; }

.connection-card {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  position: relative;
  transition: transform 0.05s;
  box-shadow: var(--shadow-sm);
  min-height: 200px;
  display: flex;
  flex-direction: column;
}
.connection-card:hover {
  transform: translate(-1px, -1px);
  box-shadow: var(--shadow-md);
}
.connection-card .card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}
.connection-card .logo {
  width: 36px;
  height: 36px;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  background: var(--paper2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 18px;
}
.connection-card .name {
  font-family: 'Caveat', cursive;
  font-size: 24px;
  font-weight: 600;
  line-height: 1;
}
.connection-card .category {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}
.connection-card .conn-list {
  flex: 1;
  list-style: none;
}
.connection-card .conn-list li {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
  font-size: 14px;
}
.connection-card .stat-row {
  border-top: 1px dashed var(--muted);
  margin-top: 8px;
  padding-top: 8px;
  font-size: 13px;
  color: var(--muted);
}
.connection-card .reconnect-link {
  color: var(--blue);
  font-size: 14px;
  margin-top: 8px;
}
.connection-card .notif-count {
  position: absolute;
  top: -10px;
  right: -10px;
  background: var(--red);
  color: white;
  border: 2px solid var(--bg);
  border-radius: 50%;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}

.grid-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 18px;
}

/* Modal */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  z-index: 1000;
  padding: 60px 20px;
  overflow-y: auto;
}
.modal {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: 12px;
  width: 100%;
  max-width: 700px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  overflow: hidden;
}
.modal-head {
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-head h2 {
  font-family: 'Caveat', cursive;
  font-size: 28px;
}
.modal-body {
  padding: 20px;
}
.modal-foot {
  padding: 14px 20px;
  border-top: 1.5px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Drawer */
.drawer-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 1000;
  display: flex;
  justify-content: flex-end;
}
.drawer {
  background: var(--paper);
  border-left: 2px solid var(--line);
  width: 480px;
  max-width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  box-shadow: -4px 0 0 rgba(0,0,0,0.1);
}
.drawer-head {
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.drawer-body {
  padding: 20px;
  flex: 1;
}
.drawer-foot {
  padding: 14px 20px;
  border-top: 1.5px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--ink-soft);
}
.field .hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  font-style: italic;
}

/* Detail page */
.detail-header {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  box-shadow: var(--shadow-sm);
}
.detail-header .left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.detail-header .actions {
  display: flex;
  gap: 8px;
}
.detail-header h2 {
  font-family: 'Caveat', cursive;
  font-size: 30px;
  font-weight: 600;
  line-height: 1;
}

.breadcrumb {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 12px;
}
.breadcrumb a { color: var(--muted); }
.breadcrumb .sep { margin: 0 6px; }
.breadcrumb .current { color: var(--ink); }

.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1.5px solid var(--line);
  margin-bottom: 16px;
}
.tabs .tab {
  padding: 10px 18px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 15px;
  border-bottom: 3px solid transparent;
  margin-bottom: -1.5px;
  color: var(--muted);
}
.tabs .tab.active {
  border-bottom-color: var(--ink);
  color: var(--ink);
  font-weight: 600;
}

.section {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.section h3 {
  font-size: 22px;
  margin-bottom: 12px;
}

.kv {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 10px 16px;
  font-size: 15px;
}
.kv .k { color: var(--muted); }

/* Lateral list (sidebar dentro do detalhe) */
.split-detail {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 16px;
}
.conn-sidebar {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 12px;
  height: fit-content;
}
.conn-sidebar h4 {
  font-size: 13px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}
.conn-sidebar .item {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  margin-bottom: 4px;
}
.conn-sidebar .item.active {
  background: var(--paper2);
  border: 1.5px solid var(--line);
  font-weight: 600;
}
.conn-sidebar .item small {
  color: var(--muted);
  font-size: 12px;
  display: block;
}

/* Tabela */
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
table.data thead th {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1.5px solid var(--line);
  color: var(--muted);
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
table.data thead th .sortable {
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
table.data tbody td {
  padding: 10px 12px;
  border-bottom: 1px dashed #ccc;
}
table.data tbody tr:hover { background: var(--paper2); cursor: pointer; }
table.data tbody tr.selected { background: var(--paper2); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-state h2 {
  font-size: 32px;
  margin-bottom: 12px;
}
.empty-state .icon-big {
  font-size: 56px;
  margin-bottom: 16px;
}

.checklist {
  list-style: none;
}
.checklist li {
  padding: 4px 0;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.checklist li.done { color: var(--green); text-decoration: line-through; }

.url-box {
  background: var(--bg);
  border: 1.5px dashed var(--muted);
  border-radius: 6px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  word-break: break-all;
}
.url-box .copy-btn {
  flex-shrink: 0;
}

/* Badges com forma irregular (estilo handsketch) */
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 14px;
  font-size: 12px;
  border: 1.5px solid var(--line);
  background: var(--paper);
}

/* Split pane (W16) */
.split-pane {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  height: calc(100vh - 200px);
}
.split-pane > div {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 18px;
  overflow-y: auto;
  box-shadow: var(--shadow-sm);
}

.collapsible {
  border: 1px solid var(--muted);
  border-radius: 6px;
  margin-bottom: 12px;
  overflow: hidden;
  background: var(--paper);
}
.collapsible summary {
  padding: 10px 14px;
  cursor: pointer;
  background: var(--paper2);
  font-weight: 600;
  font-size: 14px;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.collapsible summary::after {
  content: '▼';
  font-size: 10px;
  color: var(--muted);
}
.collapsible[open] summary::after {
  content: '▲';
}
.collapsible .content {
  padding: 12px 14px;
}

/* Code-like block */
.code {
  background: #f0ebde;
  border: 1px solid var(--muted);
  border-radius: 6px;
  padding: 12px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  white-space: pre;
  overflow-x: auto;
}

/* HEADER actions row */
.toolbar-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0 16px 0;
  flex-wrap: wrap;
}

/* Atalhos cards (W11 vars fixas + templates em massa) */
.shortcut-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 18px;
}
.shortcut-card {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-sm);
}
.shortcut-card:hover {
  transform: translate(-1px, -1px);
  box-shadow: var(--shadow-md);
}
.shortcut-card .icon {
  font-size: 26px;
  flex-shrink: 0;
}
.shortcut-card .arrow {
  margin-left: auto;
  font-size: 18px;
  color: var(--muted);
}
.shortcut-card .body h4 {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 2px;
}
.shortcut-card .body p {
  color: var(--muted);
  font-size: 13px;
}

/* Affordances no header do W3 */
.affordance-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 18px;
}
.affordance {
  background: var(--paper2);
  border: 1.5px dashed var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  cursor: pointer;
  text-align: left;
}
.affordance:hover {
  background: var(--paper);
  border-style: solid;
  box-shadow: var(--shadow-sm);
}
.affordance h4 {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 2px;
}
.affordance p {
  color: var(--muted);
  font-size: 13px;
}

/* Filters bar */
.filters-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.filters-bar .filter {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 16px;
  padding: 5px 12px;
  font-size: 13px;
  cursor: pointer;
}
.filters-bar .filter.active {
  background: var(--ink);
  color: var(--paper);
}

/* Provider catalog cards */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.cat-card {

}

.section-title {

}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--ink);
  color: var(--paper);
  padding: 10px 16px;
  border-radius: 22px;
  box-shadow: var(--shadow-lg);

  animation: slideUp 0.2s;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Wireframe mode: subtle hand-drawn vibe */
.divider-dashed {
  border: none;
  border-top: 1px dashed var(--muted2);
  margin: 12px 0;
}

/* Bulk selection */
.checkbox {
  width: 14px; height: 14px;

  border-radius: 3px;
  display: inline-flex;
  align-items: center;
  justify-content: center;

}

/* Helpers */
.row { display: flex; gap: 10px; align-items: center; }
.row.between { justify-content: space-between; }
.gap-sm { gap: 6px; }
.flex-1 { flex: 1; }
.muted { color: var(--muted); }

/* =============================================================================

   ============================================================================= */

function el(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstChild;
}

function authLabel(auth) {
  return ({
    oauth_ac: 'OAuth',
    oauth_cc: 'OAuth (cc)',
    api_key: 'API Key',
    webhook: 'Webhook only',
  })[auth] || auth;
}

function statusChip(conn) {
  if (!conn) return '';
  if (conn.status === 'expired') return `<span class="chip red"><span class="dot-status red"></span>expirou</span>`;
  if (conn.status === 'revoked') return `<span class="chip red"><span class="dot-status red"></span>revogada</span>`;
  if (conn.status === 'error') return `<span class="chip red"><span class="dot-status red"></span>erro</span>`;
  if (conn.health === 'unreachable') return `<span class="chip red"><span class="dot-status red"></span>inacessível</span>`;
  if (conn.health === 'degraded') return `<span class="chip yellow"><span class="dot-status yellow"></span>degradada</span>`;
  return `<span class="chip green"><span class="dot-status green"></span>ativo</span>`;
}

function showToast(msg) {
  const t = el(`<div class="toast">${msg}</div>`);
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function openModal(content) {
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `<div class="modal-bg" onclick="if(event.target===this) closeOverlay()">
    <div class="modal">${content}</div>
  </div>`;
}

function openDrawer(content) {
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `<div class="drawer-bg" onclick="if(event.target===this) closeOverlay()">
    <div class="drawer">${content}</div>
  </div>`;
}

function closeOverlay() {
  document.getElementById('overlay').innerHTML = '';
}

function setDirty(v) {
  state.dirtyForm = v;
  document.getElementById('orgSwitcher').classList.toggle('dirty', v);
}

/* =============================================================================
   ROUTING
   ============================================================================= */

function navigate(route) {
  if (state.dirtyForm) {
    showDirtyStateModal(() => {
      state.dirtyForm = false;
      setDirty(false);
      window.location.hash = route;
    });
    return;
  }
  window.location.hash = route;
}

function currentRoute() {
  return window.location.hash || '#/integrations';
}

function highlightSidebar() {
  const r = currentRoute();
  document.querySelectorAll('.sidebar nav .item, .sidebar nav .sub').forEach(el => {
    el.classList.remove('active');
    if (el.dataset.route && r.startsWith(el.dataset.route)) {
      el.classList.add('active');
    }
  });
}

/* =============================================================================
   VIEWS
   ============================================================================= */

function renderView() {
  highlightSidebar();
  const r = currentRoute();
  const view = document.getElementById('view');

  if (r === '#/integrations' || r === '') {
    view.innerHTML = renderIntegrations();
    bindIntegrations();
  } else if (r.startsWith('#/integrations/legacy')) {
    view.innerHTML = renderLegacyMigration();
    bindLegacy();
  } else if (r.startsWith('#/integrations/whatsapp')) {
    if (r === '#/integrations/whatsapp') {
      view.innerHTML = renderWhatsAppList();
      bindWhatsAppList();
    } else {
      view.innerHTML = renderWabaDetail();
      bindWabaDetail();
    }
  } else if (r.startsWith('#/integrations/')) {
    view.innerHTML = renderConnectionDetail();
    bindConnectionDetail();
  } else if (r === '#/tools') {
    view.innerHTML = renderToolsGlobal();
    bindToolsGlobal();
  } else if (r.startsWith('#/tools/new')) {
    view.innerHTML = renderToolBuilder();
    bindToolBuilder();
  } else if (r === '#/visao' || r === '#/campanha' || r === '#/conversas' || r === '#/conhecimento' || r === '#/agentes' || r === '#/otimizacao') {
    view.innerHTML = renderPlaceholder(r);
  } else {
    view.innerHTML = renderIntegrations();
    bindIntegrations();
  }
}

window.addEventListener('hashchange', renderView);
document.addEventListener('DOMContentLoaded', renderView);

/* =============================================================================

   ============================================================================= */

function renderPlaceholder(route) {

}

/* =============================================================================

function openCatalogModal(category = 'all') {

    ['action', 'Actions'],

  const filtered = state.providers.filter(p => category === 'all' || p.cat === category);

  const grouped = {};
  filtered.forEach(p => {
    const key = p.cat;
    grouped[key] = grouped[key] || [];
    grouped[key].push(p);
  });

  const grid = Object.entries(grouped).map(([cat, items]) => `
    <div class="section-title">${cat[0].toUpperCase()+cat.slice(1)} (${items.length})</div>
    <div class="cat-grid">
      ${items.map(p => `
        <div class="cat-card" data-prov="${p.id}">
          <div class="h">

            <div class="name">${p.name}</div>

          <div class="muted small">Conectar →</div>
        </div>
      `).join('')}

  const html = `
    <div class="modal-head">
      <h2>Escolha uma integração</h2>

      <div class="filters-bar">

      <div class="search mb-3">
        <span>🔍</span>
        <input type="text" placeholder="Buscar provider...">

      <div class="note mt-3">Você tem ${state.quota.used}/${state.quota.max} conexões — ${state.quota.max - state.quota.used} disponíveis.</div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeOverlay()">Cancelar</button>
    </div>
  `;
  openModal(html);

  document.getElementById('affWebhook').addEventListener('click', openWebhookCustomDrawer);
  document.getElementById('affCustom').addEventListener('click', openCustomIntegrationDrawer);
  document.querySelectorAll('.filter').forEach(b => b.addEventListener('click', () => openCatalogModal(b.dataset.cat)));

    openConnectDrawer(p);

}

function renderConnectionDetail() {
  const route = currentRoute();
  const id = route.replace('#/integrations/', '');
  const c = CONN(id);
  if (!c) return renderIntegrations();

  const p = PROV(c.providerId);
  const isMulti = c.accounts && c.accounts.length > 1;
  const isError = c.status === 'expired' || c.status === 'revoked' || c.status === 'error';

  const tabs = ['overview', 'permissions', 'objects', 'webhooks', 'tools', 'audit'];
  const tabLabels = {
    overview: 'Visão',
    permissions: 'Permissões',
    objects: 'Objetos',
    webhooks: 'Webhooks',
    tools: 'Tools',
    audit: 'Auditoria',
  };

  const visibleTabs = tabs.filter(t => {
    if (p.auth === 'webhook' && (t==='permissions' || t==='objects')) return false;
    return true;
  });

  let tabContent = '';
  switch (state.selectedTab) {
    case 'overview': tabContent = renderTabOverview(c, p); break;
    case 'permissions': tabContent = renderTabPermissions(c, p); break;
    case 'objects': tabContent = renderTabObjects(c, p); break;
    case 'webhooks': tabContent = renderTabWebhooks(c, p); break;
    case 'tools': tabContent = renderTabTools(c, p); break;
    case 'audit': tabContent = renderTabAudit(c, p); break;
  }

  let main = '';
  if (isMulti) {
    const accLis = c.accounts.map((a, i) => `
      <div class="item ${i===state.selectedAccount?'active':''}" data-acc="${i}">
        <span class="dot-status ${a==='Caixa Preta'?'yellow':'green'}"></span>
        <div>
          <div>${a}</div>
          <small>${a==='Caixa Preta'?'1d atrás':'2m atrás'}</small>
        </div>
      </div>
    `).join('');

    main = `
      <div class="split-detail">
        <aside class="conn-sidebar">
          <h4>${c.accounts.length} conexões</h4>
          ${accLis}
          <button class="btn ghost small mt-3" onclick="showToast('Abre drawer + Adicionar conta')" style="width:100%">+ Adicionar conta</button>
        </aside>
        <div>
          <div class="detail-header">
            <div class="left">
              <div class="logo">${p.logo}</div>
              <div>
                <h2>${p.name} · ${c.accounts[state.selectedAccount]}</h2>
                <div class="muted small">${p.cat} · ${authLabel(p.auth)}</div>
              </div>
            </div>
            <div class="actions">
              ${statusChip(c)}
              <button class="btn small ghost" onclick="showToast('Reconectando...')">Reconectar</button>
              <button class="btn small ghost" onclick="showToast('Testando...')">Testar</button>
              <button class="btn-icon" onclick="showToast('⋯ menu')">⋯</button>
            </div>
          </div>

          <div class="tabs">
            ${visibleTabs.map(t => `<button class="tab ${state.selectedTab===t?'active':''}" data-tab="${t}">${tabLabels[t]}</button>`).join('')}
          </div>

          ${tabContent}
        </div>
      </div>
    `;
  } else {
    main = `
      <div class="detail-header">
        <div class="left">
          <div class="logo">${p.logo}</div>
          <div>
            <h2>${p.name} · ${c.name}</h2>
            <div class="muted small">${p.cat} · ${authLabel(p.auth)}</div>
          </div>
        </div>
        <div class="actions">
          ${statusChip(c)}
          <button class="btn small ghost" onclick="showToast('Reconectando...')">Reconectar</button>
          <button class="btn small ghost" onclick="showToast('Testando...')">Testar</button>
          <button class="btn-icon" onclick="showToast('⋯ menu')">⋯</button>
        </div>
      </div>

      ${isError ? `
        <div class="banner error">
          <span class="icon">✕</span>
          <div class="text">
            <strong>Conexão com ${p.name} falhou</strong><br>
            <span class="small">Token expirou em 2026-04-29 14:22. Reconecte pra retomar.</span>
          </div>
          <button class="btn danger small">Reconectar agora</button>
        </div>
      ` : ''}

      ${!isError && c.lastEvent === '2m' ? '' : ''}

      <div class="tabs">
        ${visibleTabs.map(t => `<button class="tab ${state.selectedTab===t?'active':''}" data-tab="${t}">${tabLabels[t]}</button>`).join('')}
      </div>

      ${tabContent}
    `;
  }

  return `
    <div class="page">
      <div class="breadcrumb">
        <a onclick="navigate('#/integrations')">« Integrações</a>
        <span class="sep">/</span>
        <span class="current">${p.name}</span>
      </div>
      ${main}
    </div>
  `;
}

                <input class="input flex-1" value="https://api.norda.com/agenda">
                <button class="btn ghost small">⤓ cURL</button>
              </div>
            </div>
          </details>

          <details class="collapsible">
            <summary>Headers / Query / Body</summary>
            <div class="content">
              <p class="muted small">Headers customizados, query params e body schema (JSON).</p>
            </div>
          </details>

          <details class="collapsible">
            <summary>Mapeamento de resposta</summary>
            <div class="content">
              <p class="small">Campos mapeados:</p>
              <ul>
                <li><code>especialista_nome</code> ← <code>$.data[0].name</code></li>
                <li><code>horario_disponivel</code> ← <code>$.data[0].slots[0]</code></li>
              </ul>
              <button class="btn ghost small mt-2">+ Adicionar mapeamento</button>
            </div>
          </details>
        </div>

        <div>
          <h3 class="mb-3">Teste / Preview</h3>

          <div class="field">
            <label>Input simulado</label>
            <textarea class="textarea code" rows="5" id="testInput">{
  "lead_id": "lead_abc123",
  "topic": "agendamento"
}</textarea>
          </div>

          <button class="btn" id="btnRunTest">▶ Run test</button>

          <div id="testResultArea" class="mt-4"></div>

          <hr class="divider-dashed">

          <div class="banner small" id="testStatus">
            <span class="icon">⏳</span>
            <div class="text">Rode o teste pra poder ativar a tool</div>
          </div>
        </div>
      </div>

      <div class="row mt-4" style="justify-content:flex-end;gap:10px">
        <button class="btn ghost" onclick="navigate('#/tools')">Cancelar</button>
        <button class="btn secondary" onclick="setDirty(false);showToast('Rascunho salvo')">Salvar rascunho</button>
        <button class="btn" id="btnActivate" disabled style="opacity:0.4">Activate ✓</button>
      </div>

      <p class="note text-center mt-3">D-TOOL6: split-pane com teste obrigatório (pattern Retool/Make/Zapier). Activate exige teste verde.</p>
    </div>
  `;
}

function bindToolBuilder() {
  setDirty(true);

  document.getElementById('btnRunTest').addEventListener('click', () => {
    document.getElementById('testResultArea').innerHTML = `
      <div class="banner success small">
        <span class="icon">✓</span>
        <div class="text">200 OK · 142ms · response abaixo</div>
      </div>
      <div class="code">{
  "data": [
    {
      "name": "Maria S.",          ← clique pra mapear
      "email": "maria@norda.com",  ← clique pra mapear
      "slots": ["09:00", "10:00"]  ← clique pra mapear
    }
  ]
}</div>
    `;
    document.getElementById('testStatus').innerHTML = `
      <span class="icon">✓</span>
      <div class="text"><strong>Teste passou</strong> — pode ativar.</div>
    `;
    document.getElementById('testStatus').className = 'banner success small';
    const btnAct = document.getElementById('btnActivate');
    btnAct.disabled = false;
    btnAct.style.opacity = '1';
    btnAct.addEventListener('click', () => {
      setDirty(false);
      showToast('Tool ativada · v2 publicada');
      navigate('#/tools');
    });
  });

  document.querySelectorAll('#toolName, #toolDesc, #testInput').forEach(el =>
    el.addEventListener('input', () => setDirty(true))
  );
}

function renderLegacyMigration() {
  const legacy = [
    { provider: 'Hotmart', logo: 'H', name: 'JF Rocket', type: 'Auto (client_creds)', status: 'pending' },
    { provider: 'HubSpot', logo: 'Hs', name: 'Conexão importada', type: 'Re-autorizar (OAuth)', status: 'pending' },
    { provider: 'Hubla', logo: 'Hu', name: 'Loja Filial', type: 'URL preservada (alias)', status: 'pending' },
    { provider: 'Stripe', logo: 'St', name: 'Stripe Prod', type: 'Auto (api_key)', status: 'failed' },
    { provider: 'Pipedrive', logo: 'P', name: 'Nord Academy', type: 'Re-autorizar (OAuth)', status: 'migrated' },
    { provider: 'WABA', logo: 'W', name: 'Jota Fiuza Marco Zero', type: 'Auto', status: 'migrated' },
    { provider: 'DMG', logo: 'D', name: 'DMG Loja A', type: 'Auto (api_key)', status: 'pending' },
    { provider: 'Calendly', logo: 'Ca', name: 'Calendly Time SP', type: 'Re-autorizar (OAuth)', status: 'pending' },
  ];

  return `
    <div class="page">
      <div class="breadcrumb">
        <a onclick="navigate('#/integrations')">« Integrações</a>
        <span class="sep">/</span>
        <span class="current">Migração de conexões legacy</span>
      </div>

      <div class="page-header">
        <h1>Migração de conexões legacy</h1>
      </div>

      <div class="banner mb-3">
        <span class="icon">ℹ️</span>
        <div class="text">Você tem ${legacy.length} conexões na versão anterior do AwSales. Migrar mantém URL de webhook, histórico de eventos e templates.</div>
      </div>

      <div class="row mb-3">
        <button class="btn">Migrar todas (${legacy.filter(l=>l.status==='pending').length} automáticas + 4 que precisam re-auth)</button>
        <button class="btn ghost">Pular tudo (manter como está)</button>
      </div>

      <div class="section">
        <table class="data">
          <thead>
            <tr><th>Provider</th><th>Nome legacy</th><th>Tipo de migração</th><th>Status</th><th>Ação</th></tr>
          </thead>
          <tbody>
            ${legacy.map(l => `
              <tr>
                <td><span class="row gap-sm"><span class="logo" style="width:24px;height:24px;font-size:13px">${l.logo}</span> ${l.provider}</span></td>
                <td>${l.name}</td>
                <td class="muted small">${l.type}</td>
                <td>${l.status === 'migrated' ? '<span class="chip green">✓ Migrada</span>' :
                      l.status === 'failed' ? '<span class="chip red">⚠ Falhou</span>' :
                      '<span class="chip">○ Não migrada</span>'}</td>
                <td>${l.status === 'migrated' ? '<button class="btn small ghost">Ver →</button>' :
                      l.status === 'failed' ? '<button class="btn small ghost">Tentar novamente</button>' :
                      l.type.includes('Re-autorizar') ? '<button class="btn small">Re-auth</button>' :
                      '<button class="btn small">Migrar</button>'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div class="banner small">
        <span class="icon">ℹ️</span>
        <div class="text">
          <strong>Tipos de migração:</strong>
          <ul style="margin-top:4px">
            <li>• <strong>Auto</strong> — backend transfere tokens silenciosamente (Hotmart/Kiwify/api_key)</li>
            <li>• <strong>Re-autorizar</strong> — OAuth muda escopos, cliente clica e re-autoriza no provider</li>
            <li>• <strong>URL preservada</strong> — webhook URL legacy continua funcionando via aliasing backend</li>
          </ul>
          <div class="mt-2 italic">Migração mantém connectionId interno estável — campanhas legacy continuam OK.</div>
        </div>
      </div>
    </div>
  `;
}

function showDirtyStateModal(onConfirm) {
  openModal(`
    <div class="modal-head">
      <h2>⚠️ Você tem alterações não salvas</h2>
    </div>
    <div class="modal-body">
      <p class="mb-3">Tela: <strong>Webhook config · Hotmart Loja Expressa</strong></p>
      <p class="muted small mb-3">Se você navegar agora, suas alterações em "URL do webhook" e "schema" serão perdidas.</p>
      <div class="banner warning small">
        <span class="icon">ℹ️</span>
        <div class="text">D-UX1: dirty-state guard global protege contra perda silenciosa.</div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeOverlay()">Cancelar</button>
      <button class="btn secondary" onclick="closeOverlay();window['__pendingNav']?.()">Descartar e navegar</button>
      <button class="btn" onclick="closeOverlay();showToast('Salvo · navegando...');window['__pendingNav']?.()">Salvar e navegar</button>
    </div>
  `);
  window['__pendingNav'] = onConfirm;
}

});
