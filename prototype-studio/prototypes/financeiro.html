<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Studio · Awsales — Financeiro</title>
<link rel="stylesheet" href="../assets/shell.css">
<style>
/* === estilos específicos da página Financeiro === */

.flex-1{flex:1;}.text-right{text-align:right;}

/* Layout config: sub-tabs internas (esquerda) + conteúdo financeiro (direita) */
.config-layout{display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:flex-start;}
.config-tabs{background:var(--paper);border:1.5px solid var(--ink);border-radius:12px;padding:16px 0;box-shadow:var(--shadow-sm);height:fit-content;position:sticky;top:24px;}
.config-tabs .org-head{padding:0 16px 12px;border-bottom:1px dashed var(--muted2);margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.config-tabs .org-head .ico{width:36px;height:36px;background:var(--blue);color:var(--paper);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Caveat';font-size:22px;font-weight:700;}
.config-tabs .tab{display:block;padding:8px 16px;font-size:14px;cursor:pointer;color:var(--ink);border-left:3px solid transparent;text-decoration:none;}
.config-tabs .tab:hover{background:var(--paper2);}
.config-tabs .tab.active{background:var(--paper2);border-left-color:var(--orange);font-weight:600;}

/* Page-internal nav (Visão Geral / Saldo / Modais / Sub-telas) — fica abaixo do shell demo-nav */
.page-nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:8px 10px;border:1.5px dashed var(--muted2);border-radius:10px;background:var(--paper2);}
.page-nav .group-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;padding:0 4px 0 8px;border-left:1px solid var(--muted2);}
.page-nav .group-label:first-child{border:none;}
.page-nav button{background:var(--paper);border:1px dashed var(--muted2);color:var(--ink);padding:3px 8px;border-radius:12px;font-size:11px;cursor:pointer;font-family:inherit;}
.page-nav button:hover{background:var(--paper3);}
.page-nav button.active{background:var(--ink);color:var(--paper);border-color:var(--ink);font-weight:600;}

/* Sub-tabs (Visão geral · Saldo de créditos) — dentro da página Financeiro */
.subtabs{display:flex;gap:0;border-bottom:1.5px solid var(--ink);margin-bottom:20px;}
.subtab{padding:12px 24px;cursor:pointer;color:var(--muted);font-size:15px;border-bottom:3px solid transparent;margin-bottom:-1.5px;}
.subtab:hover{color:var(--ink);}
.subtab.active{color:var(--ink);font-weight:600;border-bottom-color:var(--orange);}

/* Block head extra (shell.css define .block) */
.block h3{margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}

/* Cards row */
.cards-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px;}
.card-mini{border:1.5px solid var(--ink);background:var(--paper);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow-sm);}
.card-mini .lbl{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.card-mini .val{font-size:18px;font-weight:600;}
.card-mini .sub{color:var(--muted);font-size:11px;}

/* Plan card */
.plan-card{border:1.5px solid var(--ink);border-radius:12px;background:var(--paper);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);}
.plan-card .left h3{margin:0;}
.plan-card .left .meta{color:var(--muted);font-size:13px;margin-top:2px;}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:14px;font-size:12px;font-weight:500;}
.status-badge.active{background:var(--green-bg);color:var(--green);}
.status-badge.open{background:var(--yellow-bg);color:var(--yellow);}
.status-badge.paid{background:var(--green-bg);color:var(--green);}
.status-badge.failed{background:var(--red-bg);color:var(--red);}
.status-badge.expired{background:var(--orange-bg);color:var(--orange);}
.status-badge.disputed{background:var(--red-bg);color:var(--red);}
.status-badge.void{background:var(--paper2);color:var(--muted);}
.status-badge.pending{background:var(--yellow-bg);color:var(--yellow);}
.status-badge.inactive{background:var(--paper2);color:var(--muted);}
.status-badge.depleted{background:var(--purple-bg);color:var(--purple);}
.status-badge.pastdue{background:var(--red-bg);color:var(--red);}
.status-badge::before{content:"●";font-size:8px;}

/* Fatura card layout */
.fatura-card{border:1.5px solid var(--ink);border-radius:12px;background:var(--paper);padding:14px 18px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.fatura-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.fatura-card .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;align-items:center;}
.fatura-card .grid .item{}
.fatura-card .grid .item .lbl{color:var(--muted);font-size:12px;}
.fatura-card .grid .item .val{font-size:16px;font-weight:500;margin-top:2px;}
.card-method{display:inline-flex;align-items:center;gap:6px;}

/* Chart */
.chart-wrap{margin:14px 0;}
.chart-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.chart{display:flex;align-items:flex-end;gap:6px;height:220px;border-bottom:1.5px solid var(--ink);border-left:1.5px solid var(--ink);padding:10px 0 0 6px;position:relative;}
.bar{flex:1;display:flex;flex-direction:column-reverse;min-width:18px;position:relative;}
.bar-seg{width:100%;border-top:1px solid rgba(0,0,0,0.1);}
.bar-seg.disparos{background:var(--blue);}
.bar-seg.leads{background:var(--green);}
.bar-seg.msgs{background:var(--orange);}
.bar-seg.tokens{background:var(--purple);}
.bar .day{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted);}
.economy-overlay{position:absolute;top:30%;left:6px;right:0;height:2px;border-top:2px dashed var(--red);}
.economy-overlay::after{content:"Economia: R$ 132,40";position:absolute;top:-18px;right:0;color:var(--red);font-size:11px;}
.chart-legend{display:flex;gap:14px;margin-top:30px;font-size:12px;color:var(--muted);}
.chart-legend .item{display:inline-flex;align-items:center;gap:4px;}
.chart-legend .swatch{width:12px;height:12px;border-radius:3px;}

/* Table — total-row e kebab são específicos da página */
.table .total-row{background:var(--green-bg);font-weight:600;}
.kebab{cursor:pointer;padding:4px 8px;border-radius:6px;}
.kebab:hover{background:var(--paper2);}

/* Audit item */
.audit-item{border-bottom:1px dashed var(--muted2);padding:10px 0;display:grid;grid-template-columns:80px 1fr;gap:12px;align-items:flex-start;}
.audit-item .time{color:var(--muted);font-size:12px;font-family:monospace;}
.audit-item .actor{font-weight:600;font-size:13px;}
.audit-item .action{color:var(--blue);font-size:13px;font-family:monospace;}
.audit-item .meta{color:var(--muted);font-size:12px;margin-top:2px;}
.actor-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;text-transform:uppercase;letter-spacing:0.3px;margin-right:4px;}
.actor-badge.awsales{background:var(--blue-bg);color:var(--blue);}
.actor-badge.cliente{background:var(--green-bg);color:var(--green);}
.actor-badge.sistema{background:var(--orange-bg);color:var(--orange);}

/* Modal extras (modal-mask, .modal, .modal.lg vêm do shell) */
.modal h3{margin-bottom:8px;}
.btn-row{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

.row-pair{display:grid;grid-template-columns:200px 1fr;gap:6px 12px;font-size:14px;margin:4px 0;}
.row-pair .label{color:var(--muted);}

.contact-card{border:1.5px solid var(--muted2);border-radius:8px;padding:10px 14px;background:var(--paper2);margin:8px 0;}

/* Empty state */
.empty{padding:40px 20px;text-align:center;}
.empty .ico{font-size:48px;margin-bottom:10px;}

/* Coupon row */
.coupon-applied{background:var(--green-bg);color:var(--green);padding:2px 8px;border-radius:10px;font-size:11px;font-family:monospace;display:inline-block;}

/* Toggle group (GCP-style) */
.toggle-group{display:inline-flex;border:1.5px solid var(--ink);border-radius:8px;overflow:hidden;background:var(--paper);}
.toggle-group button{background:transparent;border:none;padding:6px 14px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--muted);border-right:1px solid var(--ink);}
.toggle-group button:last-child{border-right:none;}
.toggle-group button.active{background:var(--ink);color:var(--paper);font-weight:600;}
.toggle-group button:hover:not(.active){background:var(--paper2);color:var(--ink);}

/* Campaign-colored segments */
.bar-seg.camp-bf{background:#3257b8;}
.bar-seg.camp-crm{background:#2f7a35;}
.bar-seg.camp-sdr{background:#c46818;}
.bar-seg.camp-ob{background:#6b3da8;}
.bar-seg.camp-out{background:#b8870e;}

/* Timeline (Onda 2 F2.2) */
.timeline{list-style:none;padding-left:18px;position:relative;margin:8px 0;}
.timeline::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;background:var(--muted2);}
.tl-item{position:relative;padding:6px 0 6px 16px;font-size:13px;line-height:1.5;}
.tl-dot{position:absolute;left:-15px;top:11px;width:11px;height:11px;border-radius:50%;background:var(--muted);border:2px solid var(--paper);box-shadow:0 0 0 1px var(--muted);}
.tl-item.ok .tl-dot{background:var(--green);box-shadow:0 0 0 1px var(--green);}
.tl-item.warn .tl-dot{background:var(--red);box-shadow:0 0 0 1px var(--red);}
.tl-item.info .tl-dot{background:var(--blue);box-shadow:0 0 0 1px var(--blue);}

/* Progress bar voucher (Onda 2 F2.3) */
.progress{height:10px;background:var(--paper2);border:1.5px solid var(--ink);border-radius:6px;overflow:hidden;margin:4px 0;position:relative;}
.progress-fill{height:100%;background:var(--green);}
.progress-fill.warn{background:var(--yellow);}
.progress-fill.danger{background:var(--red);}
.voucher-row{display:grid;grid-template-columns:1fr 140px;gap:10px;align-items:center;}

/* Audit trail PT-BR labels + jump-to-date (Onda 2 F2.7) */
.action-pt{color:var(--ink);font-weight:500;font-size:13px;}
.action-pt:hover[title]{cursor:help;}
.audit-pagination{display:flex;gap:6px;align-items:center;margin-top:14px;flex-wrap:wrap;}
.audit-pagination button{padding:4px 10px;border:1.5px solid var(--muted2);background:var(--paper);border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;}
.audit-pagination button.active{background:var(--ink);color:var(--paper);border-color:var(--ink);font-weight:600;}
.audit-pagination button:hover:not(.active){background:var(--paper2);}

/* WCAG: focus em elementos específicos da página */
.subtab:focus-visible,.bar:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}

@media (max-width:900px){.config-layout{grid-template-columns:1fr;}.config-tabs{position:static;}}
</style>
</head>

<script>
/* Estados internos do protótipo Financeiro acessíveis via hash:
 *   #visao-geral · #saldo-creditos
 *   #modal-plano · #modal-campanha · #modal-fatura · #modal-fatura-disputed
 *   #modal-lgpd · #modal-cupom
 *   #plano-pastdue · #creditos-vazio
 *   #metodos-pagamento · #audit-completo
 * Cliques internos da tela já navegam entre eles. Nav extra no topo foi
 * removida — agora a navegação cross-protótipos vive na demo-nav do shell. */

function navigate(id) { location.hash = id; render(); }
function setActive(_id) { /* no-op: nav local foi removida */ }
let lastFocusBeforeModal = null;
function showModal(html, lg) {
  const modal = document.getElementById('modalContent');
  modal.className = 'modal' + (lg ? ' lg' : '');
  modal.innerHTML = html;
  document.getElementById('modalMask').classList.add('show');
  lastFocusBeforeModal = document.activeElement;
  // WCAG: focus no modal pra screen readers
  setTimeout(() => modal.focus(), 50);
}
function closeModal() {
  document.getElementById('modalMask').classList.remove('show');
  if (lastFocusBeforeModal && typeof lastFocusBeforeModal.focus === 'function') {
    lastFocusBeforeModal.focus();
  }
}
document.getElementById('modalMask').addEventListener('click', e => { if (e.target.id === 'modalMask') closeModal(); });
// WCAG: Esc fecha modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('modalMask').classList.contains('show')) closeModal();
});

/* HELPERS */
function subtabs(active) {
  return `
    <div class="subtabs">
      <span class="subtab ${active === 'visao' ? 'active' : ''}" onclick="navigate('visao-geral')">▣ Visão geral</span>
      <span class="subtab ${active === 'creditos' ? 'active' : ''}" onclick="navigate('saldo-creditos')">🎟 Saldo de créditos</span>
    </div>
  `;
}

// Toggle de agrupamento: 'servico' (default) | 'campanha'
let gastosGrouping = 'servico';
// Toggle de escala: 'linear' (default) | 'pct' (100% empilhado) | 'log' — Onda 2 F2.4
let gastosScale = 'linear';
// Cache dos dias do mês — mantém estável entre re-renders (evita Math.random a cada toggle)
let gastosDays = null;

function setGrouping(mode) {
  gastosGrouping = mode;
  document.getElementById('grpServico').classList.toggle('active', mode === 'servico');
  document.getElementById('grpCampanha').classList.toggle('active', mode === 'campanha');
  document.getElementById('grpServico').setAttribute('aria-pressed', mode === 'servico');
  document.getElementById('grpCampanha').setAttribute('aria-pressed', mode === 'campanha');
  renderChartAndTable();
}

function setScale(mode) {
  gastosScale = mode;
  ['Linear', '100', 'Log'].forEach(s => {
    const id = 'scale' + s;
    const target = (s === 'Linear' && mode === 'linear') || (s === '100' && mode === 'pct') || (s === 'Log' && mode === 'log');
    document.getElementById(id).classList.toggle('active', target);
    document.getElementById(id).setAttribute('aria-pressed', target);
  });
  renderChartAndTable();
}

function renderChartAndTable() {
  const chartEl = document.getElementById('chart');
  const legendEl = document.getElementById('chartLegend');
  const tableEl = document.getElementById('detailedTable');
  if (!chartEl || !legendEl || !tableEl) return;

  chartEl.innerHTML = generateBars(gastosGrouping, gastosScale);
  legendEl.innerHTML = generateLegend(gastosGrouping);
  tableEl.innerHTML = generateDetailedTable(gastosGrouping);
}

function ensureDays() {
  if (gastosDays) return gastosDays;
  gastosDays = [];
  for (let i = 1; i <= 31; i++) {
    gastosDays.push({ day: i, total: i <= 7 ? Math.random() * 80 + 20 : (i <= 14 ? Math.random() * 30 + 5 : 0) });
  }
  return gastosDays;
}

function generateBars(mode, scale) {
  const days = ensureDays();
  const maxTotal = Math.max(...days.map(d => d.total));
  const logMax = Math.log10(maxTotal + 1);
  let html = '';
  days.forEach(d => {
    let totalHeight;
    if (scale === 'pct') totalHeight = d.total > 0 ? 100 : 0;
    else if (scale === 'log') totalHeight = d.total > 0 ? (Math.log10(d.total + 1) / logMax) * 100 : 0;
    else totalHeight = (d.total / maxTotal) * 100;

    const isVisible = d.day % 2 === 1 || d.day === 31;
    const segs = mode === 'servico'
      ? [['disparos', 0.4], ['leads', 0.25], ['msgs', 0.2], ['tokens', 0.15]]
      : [['camp-bf', 0.45], ['camp-crm', 0.30], ['camp-sdr', 0.15], ['camp-ob', 0.10]];
    const bars = segs.map(([cls, pct]) =>
      `<div class="bar-seg ${cls}" style="height:${totalHeight * pct}%;"></div>`
    ).join('');
    const tip = scale === 'pct'
      ? `Dia ${d.day} · proporção ${segs.map(([c, p]) => Math.round(p * 100) + '%').join(' / ')}`
      : `Dia ${d.day} · R$ ${(d.total * 12).toFixed(2)} ${scale === 'log' ? '(escala log)' : ''}`;
    html += `
      <div class="bar" title="${tip}" onclick="openDayDrawer(${d.day}, ${d.total.toFixed(2)})" role="button" tabindex="0" aria-label="${tip}">
        ${bars}
        ${isVisible ? `<span class="day">${d.day}</span>` : ''}
      </div>
    `;
  });
  if (scale !== 'pct') html += '<div class="economy-overlay" aria-label="Linha de economia: R$ 132,40 descontados via cupom/voucher"></div>';
  return html;
}

function applyCoupon() {
  const code = document.getElementById('couponCode').value.trim();
  if (!code) return;
  // 50% sucesso — outros casos exibem mensagens específicas (Cenário 25 v2)
  const r = Math.random();
  if (r < 0.5 && code.length > 3) {
    showModal(`
      <h3 style="color:var(--green)">✓ Cupom aplicado!</h3>
      <p>Cupom <strong>${code}</strong> aplicado com sucesso.</p>
      <p>Você terá 20% de desconto na próxima fatura.</p>
      <div class="btn-row"><button class="btn" onclick="closeModal()">Entendi</button></div>
    `);
  } else {
    // Erro específico (Cenário 25 v2) — alterna entre os 5 motivos
    const motivos = [
      { titulo: "Cupom não encontrado", msg: `O cupom <strong>"${code}"</strong> não foi encontrado em nosso sistema. Verifique se digitou corretamente.` },
      { titulo: "Cupom expirado", msg: `O cupom <strong>"${code}"</strong> expirou em <strong>31/12/2025</strong>. Solicite um novo código ao seu gerente comercial.` },
      { titulo: "Limite de uso atingido", msg: `O cupom <strong>"${code}"</strong> atingiu o limite de uso (<strong>1.000 de 1.000 resgates</strong>). Este código não pode mais ser aplicado.` },
      { titulo: "Moeda incompatível", msg: `O cupom <strong>"${code}"</strong> é em <strong>USD</strong>. Sua organização opera em <strong>BRL</strong> — solicite ao gerente comercial um cupom compatível com sua moeda.` },
      { titulo: "Validade vencida", msg: `O cupom <strong>"${code}"</strong> tinha validade até <strong>10/05/2026</strong> e não pode mais ser aplicado.` },
    ];
    const m = motivos[Math.floor(Math.random() * motivos.length)];
    showModal(`
      <h3 style="color:var(--red)">✕ ${m.titulo}</h3>
      <p>${m.msg}</p>
      <p class="muted small" style="margin-top:14px;">Pra mais detalhes ou solicitar um novo cupom, fale com seu Gerente da Conta.</p>
      <div class="btn-row"><button class="btn" onclick="closeModal()">Entendi</button></div>
    `);
  }
}

/* ROUTER */
const renderers = {
  'visao-geral': renderVisaoGeral,
  'saldo-creditos': renderSaldoCreditos,
  'modal-plano': renderModalPlano,
  'modal-campanha': renderModalCampanha,
  'modal-fatura': renderModalFatura,
  'modal-fatura-disputed': renderModalFaturaDisputed,
  'modal-lgpd': renderModalLgpd,
  'modal-cupom': renderModalCupom,
  'plano-pastdue': renderPlanoPastDue,
  'creditos-vazio': renderCreditosVazio,
  'metodos-pagamento': renderMetodosPagamento,
  'audit-completo': renderAuditCompleto,
};

function render() {
  const id = (location.hash || '#visao-geral').slice(1);
  const fn = renderers[id] || renderVisaoGeral;
  document.getElementById('finPageContent').innerHTML = fn();
  setActive(id);
  window.scrollTo(0, 0);
  // Render do gráfico+tabela com agrupamento atual
  setTimeout(() => {
    renderChartAndTable();
    const cb = document.getElementById('lgpdCheck');
    if (cb) cb.onchange = e => { document.getElementById('lgpdConfirm').disabled = !e.target.checked; };
  }, 50);
}

window.addEventListener('hashchange', render);

// Boot depois do shell — shell.js move o conteúdo de <main class="page-content"> pra dentro do app-shell.
// Esperamos DOMContentLoaded (ou rodamos direto se a página já carregou) pra garantir que #finPageContent
// e #breadcrumb existam antes do primeiro render.
function bootFinanceiro() {
  render();
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootFinanceiro);
} else {
  bootFinanceiro();
}
</script>
