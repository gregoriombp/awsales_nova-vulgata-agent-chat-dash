<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Studio · Awsales — Configurações da Organização</title>
<link rel="stylesheet" href="../assets/shell.css">
<style>
/* === estilos específicos da página Configurações === */

/* INNER SIDEBAR (sub-tabs internas: Configurações gerais · Team · Funções · Financeiro · Segurança) */
.config-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 24px;
}
.config-tabs {
  background: var(--paper);
  border: 1.5px dashed var(--muted2);
  border-radius: 12px;
  padding: 14px 0;
  box-shadow: var(--shadow-sm);
  height: fit-content;
  position: sticky;
  top: 96px;
}
.config-tabs .org-head {
  padding: 0 16px 12px;
  border-bottom: 1px dashed var(--muted2);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 10px;
}
.config-tabs .org-head .ico {
  width: 34px; height: 34px;
  background: var(--blue);
  color: var(--paper);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Caveat'; font-size: 20px; font-weight: 700;
  border: 1.5px solid var(--ink);
}
.config-tabs .tab {
  display: block;
  padding: 8px 16px;
  font-size: 14px;
  cursor: pointer;
  color: var(--ink-soft);
  border-left: 3px solid transparent;
  text-decoration: none;
}
.config-tabs .tab:hover { background: var(--paper2); }
.config-tabs .tab.active {
  background: var(--paper2);
  border-left-color: var(--orange);
  font-weight: 600;
  color: var(--ink);
}

/* PAGE LAYOUT */
.page-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 16px;
  gap: 14px;
}

/* Row-pair (chave-valor) usado em blocos de dados */
.block .row-pair {
  display: grid;
  grid-template-columns: 200px 1fr auto;
  gap: 4px 12px;
  font-size: 15px;
  margin: 4px 0;
  align-items: baseline;
}
.block .row-pair .label { color: var(--muted); }
.lock { color: var(--muted); font-size: 12px; }

/* Botões extras (danger) */
.btn.danger { background: var(--red); border-color: var(--red); color: var(--paper); }

/* Field (label + input) */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }

/* Kebab */
.kebab {
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.kebab:hover { background: var(--paper2); }

/* Status dots (Team — Ativo/Convite/etc.) */
.status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
}
.status::before {
  content: ""; display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
}
.status.active { color: var(--green); }
.status.active::before { background: var(--green); }
.status.inactive { color: var(--red); }
.status.inactive::before { background: var(--red); }
.status.invite { color: var(--yellow); }
.status.invite::before { background: var(--yellow); }
.status.expired { color: var(--orange); }
.status.expired::before { background: var(--orange); }

/* Avatar pequeno (Team) */
.avatar-sm {
  width: 28px; height: 28px;
  background: var(--blue);
  color: var(--paper);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}
.avatar-sm.orange { background: var(--orange); }
.avatar-sm.green { background: var(--green); }
.avatar-sm.red { background: var(--red); }

/* Btn-row (footer de modal/bloco) */
.btn-row {
  display: flex; justify-content: flex-end; gap: 10px;
  margin-top: 20px;
}

/* Chips input (Convidar) */
.chips-input {
  border: 1.5px solid var(--ink);
  border-radius: 6px;
  background: var(--paper);
  padding: 6px;
  min-height: 60px;
  display: flex; flex-wrap: wrap;
  gap: 6px; align-items: flex-start;
}
.chip {
  background: var(--paper2);
  border: 1px solid var(--muted2);
  border-radius: 14px;
  padding: 3px 10px;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.chip .x { cursor: pointer; opacity: 0.6; }
.chips-input input {
  border: none; outline: none;
  flex: 1; min-width: 160px;
  padding: 4px;
  background: transparent;
  font-family: inherit;
  font-size: 14px;
}

/* Toggle switch (2FA) */
.toggle-switch {
  width: 46px; height: 24px;
  background: var(--muted2);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-switch::after {
  content: ''; position: absolute;
  width: 18px; height: 18px;
  background: var(--paper);
  border-radius: 50%;
  top: 3px; left: 3px;
  transition: left 0.2s;
  border: 1px solid var(--ink);
}
.toggle-switch.on { background: var(--green); }
.toggle-switch.on::after { left: 25px; }

/* Permission tree (Funções) */
.perm-domain {
  margin: 10px 0;
  padding: 10px 0;
  border-top: 1px dashed var(--muted2);
}
.perm-domain summary {
  cursor: pointer;
  font-weight: 600;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.perm-row {
  padding: 4px 0 4px 22px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.perm-row .pii-mark {
  color: var(--orange);
  font-size: 13px;
}

/* Audit trail item */
.audit-item {
  border-bottom: 1px dashed var(--muted2);
  padding: 12px 0;
  display: grid;
  grid-template-columns: 90px 1fr;
  gap: 14px;
  align-items: flex-start;
}
.audit-item .time { color: var(--muted); font-size: 13px; font-family: monospace; }
.audit-item .who { font-weight: 600; }
.audit-item .action { color: var(--blue); font-size: 13px; font-family: monospace; }
.audit-item .resource { font-size: 14px; }
.audit-item .origin { color: var(--muted); font-size: 12px; }

/* Ícones de sucesso/erro (modais) */
.success-icon {
  width: 64px; height: 64px;
  background: var(--green);
  color: var(--paper);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  border: 2px solid var(--ink);
}
.error-icon { background: var(--red); }
.warn-icon { background: var(--yellow); }

.text-right { text-align: right; }

/* Responsivo: empilha sub-tabs quando estreito */
@media (max-width: 820px) {
  .config-layout { grid-template-columns: 1fr; }
  .config-tabs { position: static; }
}
</style>
</head>

<script>
function navigate(id) { location.hash = id; render(); }
function setActive(id) {
  // sync inner sub-tabs (Configurações gerais · Team · Funções · Segurança)
  document.querySelectorAll('.config-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === id);
  });
}

function setBreadcrumb(html) {
  const el = document.getElementById('breadcrumb');
  if (el) el.innerHTML = html;
}

function showModal(html, lg) {
  const modal = document.getElementById('modalContent');
  modal.className = 'modal' + (lg ? ' lg' : '');
  modal.innerHTML = html;
  document.getElementById('modalMask').classList.add('show');
}
function closeModal() { document.getElementById('modalMask').classList.remove('show'); }
document.getElementById('modalMask').addEventListener('click', e => {
  if (e.target.id === 'modalMask') closeModal();
});

function memberRow(initials, name, email, statusKey, statusLabel, role, date, avatarColor, clickAction) {
  return `
    <tr>
      <td><span class="avatar-sm ${avatarColor}">${initials}</span> ${name}</td>
      <td class="muted small">${email}</td>
      <td><span class="status ${statusKey}">${statusLabel}</span></td>
      <td>${role}</td>
      <td class="muted small">${date}</td>
      <td>
        <span class="kebab" onclick="showKebab('${statusKey}','${name}','${clickAction || 'visualizar'}')">⋮</span>
      </td>
    </tr>
  `;
}

function showKebab(statusKey, name, defaultAction) {
  let actions = '';
  if (statusKey === 'active') {
    actions = `
      <button class="btn-link" onclick="closeModal();navigate('visualizar')">👁 Visualizar</button><br>
      <button class="btn-link" onclick="closeModal();navigate('editar')">✎ Editar (função)</button><br>
      <button class="btn-link" onclick="closeModal();navigate('inativar')">✕ Inativar usuário</button>
    `;
  } else if (statusKey === 'invite' || statusKey === 'expired') {
    actions = `
      <button class="btn-link">✉ Reenviar convite</button><br>
      <button class="btn-link">✕ Cancelar convite</button>
    `;
  } else {
    actions = `
      <button class="btn-link" onclick="closeModal();navigate('visualizar')">👁 Visualizar</button><br>
      <button class="btn-link">↻ Reativar usuário</button>
    `;
  }
  showModal(`<h3>Ações: ${name}</h3><div style="line-height:2.2">${actions}</div>`);
}

function addInviteBlock() {

  'meu-perfil': renderMeuPerfil,

  'criar-dpo': () => renderCriarFuncao(true),
  'billing': renderBilling,
  'seguranca': renderSeguranca,
  'audit-geral': renderAuditGeral,
  'audit-pessoal': renderAuditPessoal,
  'meus-exports': renderMeusExports,
};

function render() {
  const id = (location.hash || '#config-gerais').slice(1);
  const fn = renderers[id] || renderConfigGerais;
  const target = document.getElementById('configContent');
  if (!target) return;
  const showPendingBanner = !['audit-geral', 'audit-pessoal', 'meus-exports'].includes(id);
  target.innerHTML = (showPendingBanner ? renderSecurityPolicyPendingBanner(id) : '') + fn();
  setActive(id);
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', render);
render();
