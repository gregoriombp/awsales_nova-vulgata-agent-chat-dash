<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Studio · Integrações — protótipo</title>
<link rel="stylesheet" href="../assets/shell.css">
<style>
/* === estilos específicos da página Integrações ===
   Replica fielmente /integrations do app Greg (nova-vulgata).
   Empty state hero + populated table + explore grid + add catalog modal
   + connect modal (oauth/webhook/apiKey) + instance detail modal.
*/

/* ---------- Hero / empty state (first-run) ---------- */
.hero-wrap {
  display: flex; align-items: center; justify-content: center;
  padding: 60px 20px;
}
.hero {
  width: 100%; max-width: 760px;
  display: flex; flex-direction: column; align-items: center;
}
.hero .brands { display: flex; flex-direction: column; gap: 18px; align-items: center; }
.hero .brand-row { display: flex; gap: 24px; align-items: center; justify-content: center; }
.hero .brand-bubble {
  width: 64px; height: 64px;
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 16px;
  box-shadow: var(--shadow-md);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Caveat'; font-weight: 700; font-size: 22px;
  color: var(--ink);
  transform: rotate(-2deg);
}
.hero .brand-bubble:nth-child(even) { transform: rotate(2deg); }
.hero h2 {
  margin: 36px 0 0; max-width: 520px; text-align: center;
  font-size: 28px; font-family: 'Patrick Hand', sans-serif;
}
.hero p.sub {
  margin: 12px 0 0; max-width: 480px; text-align: center;
  font-size: 15px; color: var(--muted); line-height: 1.5;
}
.hero .cta-row { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.hero .divider-row {
  margin: 32px 0 18px; width: 100%;
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--muted);
}
.hero .divider-row span.line { flex: 1; height: 1px; background: var(--muted2); }
.hero .picks { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.pick-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px 6px 8px;
  border-radius: 999px;
  border: 1.5px dashed var(--muted2);
  background: var(--paper);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  color: var(--ink);
}
.pick-pill:hover { border-color: var(--ink); background: var(--paper2); transform: translate(-1px,-1px); box-shadow: var(--shadow-sm); }
.pick-pill .brand-mini {
  width: 22px; height: 22px;
  border: 1.5px solid var(--ink);
  border-radius: 6px;
  background: var(--paper2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Caveat'; font-weight: 700; font-size: 12px;
}

/* ---------- Populated state ---------- */
.page-header-row {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1.5px dashed var(--muted2);
}
.page-header-row h1 { display: flex; align-items: center; gap: 10px; margin: 0; }
.page-header-row .sub {
  margin: 6px 0 0; max-width: 560px;
  color: var(--muted); font-size: 14px; line-height: 1.5;
}

.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 16px;
}
.section-head h2 { margin: 0; font-size: 17px; font-family: 'Patrick Hand', sans-serif; }
.section-head .count { font-size: 12px; color: var(--muted); }

.toolbar-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
}
.toolbar-row .search { flex: 1; }
.toolbar-row .search .input { width: 100%; }
.toolbar-row .icon-btn {
  width: 36px; height: 36px;
  border: 1.5px solid var(--ink);
  background: var(--paper);
  border-radius: 8px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.toolbar-row .icon-btn:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow-md); }

.aw-table { width: 100%; border-collapse: collapse; }
.aw-table thead th {
  text-align: left; padding: 10px 12px;
  font-size: 12px; color: var(--muted); font-weight: 600;
  border-bottom: 1.5px dashed var(--muted2);
  cursor: pointer;
  user-select: none;
}
.aw-table thead th:hover { color: var(--ink); }
.aw-table tbody td {
  padding: 12px;
  font-size: 14px;
  border-bottom: 1px dashed var(--muted3);
}
.aw-table tbody tr { cursor: pointer; }
.aw-table tbody tr:hover { background: var(--paper2); }
.aw-table .row-inactive { opacity: 0.55; }

.cell-name { display: flex; align-items: center; gap: 12px; }
.cell-name .brand-md {
  width: 36px; height: 36px;
  border: 1.5px solid var(--ink);
  border-radius: 8px;
  background: var(--paper2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Caveat'; font-weight: 700; font-size: 16px;
  flex-shrink: 0;
}
.cell-name .label-stack { min-width: 0; }
.cell-name .primary { font-weight: 600; color: var(--ink); }
.cell-name .secondary { font-size: 12px; color: var(--muted); }

.kebab-btn {
  width: 28px; height: 28px;
  border: none; background: transparent;
  cursor: pointer; border-radius: 6px;
  font-size: 18px;
}
.kebab-btn:hover { background: var(--paper2); }

.kebab-menu {
  position: absolute; z-index: 50;
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 10px;
  box-shadow: var(--shadow-md);
  padding: 4px;
  min-width: 200px;
}
.kebab-menu button {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 10px;
  background: transparent; border: none; text-align: left;
  cursor: pointer; font-size: 13px; border-radius: 6px;
  font-family: inherit; color: var(--ink);
}
.kebab-menu button:hover { background: var(--paper2); }
.kebab-menu button.danger { color: var(--red); }
.kebab-menu .sep { height: 1px; background: var(--muted2); margin: 4px 0; opacity: 0.4; }

/* ---------- Explore grid ---------- */
.explore-wrap { margin-top: 48px; }
.explore-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.explore-card {
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 12px;
  padding: 14px;
  box-shadow: var(--shadow-sm);
  display: flex; gap: 12px; align-items: center;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
}
.explore-card:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow-md); }
.explore-card.dashed { border-style: dashed; }
.explore-card .brand-md { width: 40px; height: 40px; border: 1.5px solid var(--ink); border-radius: 8px; background: var(--paper2); display: flex; align-items: center; justify-content: center; font-family: 'Caveat'; font-weight: 700; font-size: 16px; flex-shrink: 0; }
.explore-card .body { min-width: 0; flex: 1; }
.explore-card .body .title { font-weight: 600; font-size: 14px; }
.explore-card .body .desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

/* ---------- All-removed state ---------- */
.all-removed {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  border: 1.5px dashed var(--muted2);
  border-radius: 16px;
  background: var(--paper);
  padding: 56px 32px;
}
.all-removed .ico-circle {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--paper2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  border: 1.5px dashed var(--muted2);
}
.all-removed h2 { margin: 18px 0 6px; font-size: 22px; font-family: 'Patrick Hand', sans-serif; }
.all-removed p { margin: 0; max-width: 420px; color: var(--muted); font-size: 14px; line-height: 1.5; }
.all-removed .picks { margin-top: 22px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.all-removed .ver-catalogo { margin-top: 16px; background: transparent; border: none; color: var(--muted); font-size: 13px; cursor: pointer; text-decoration: underline; font-family: inherit; }

/* ---------- Add-integration modal (sidebar + grid) ---------- */
.add-int-modal {
  width: min(960px, 94vw);
  max-height: 88vh;
  padding: 0;
  display: flex; flex-direction: column;
}
.add-int-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1.5px dashed var(--muted2);
}
.add-int-head .title-row { display: flex; gap: 10px; align-items: center; }
.add-int-head .title-row .ico {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--paper2); border: 1.5px dashed var(--muted2);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.add-int-head h2 { margin: 0; font-size: 18px; }
.add-int-body { display: flex; flex: 1; min-height: 0; }
.add-int-nav {
  width: 200px;
  border-right: 1.5px dashed var(--muted2);
  padding: 14px 10px;
  overflow-y: auto;
  flex-shrink: 0;
}
.add-int-nav button {
  display: block; width: 100%;
  padding: 8px 12px; margin-bottom: 2px;
  border: none; background: transparent;
  cursor: pointer; text-align: left;
  border-radius: 8px; font-size: 13px;
  font-family: inherit; color: var(--ink);
}
.add-int-nav button:hover { background: var(--paper2); }
.add-int-nav button.active { background: var(--ink); color: var(--paper); font-weight: 600; }
.add-int-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.add-int-main-head {
  padding: 14px 22px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border-bottom: 1.5px dashed var(--muted2);
}
.add-int-main-head h3 { margin: 0; font-size: 16px; }
.add-int-main-head .input { max-width: 260px; }
.add-int-grid {
  padding: 18px 22px;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.add-int-card {
  border: 1.5px solid var(--ink);
  border-radius: 12px;
  background: var(--paper);
  padding: 14px;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 8px;
  text-align: left;
  font-family: inherit;
  box-shadow: var(--shadow-sm);
}
.add-int-card:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow-md); }
.add-int-card.custom { border-style: dashed; }
.add-int-card .top-row { display: flex; align-items: center; gap: 10px; }
.add-int-card .name { font-weight: 600; font-size: 14px; }
.add-int-card .desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
.add-int-empty {
  padding: 60px 20px; text-align: center; color: var(--muted);
}
.add-int-empty .ico { font-size: 36px; margin-bottom: 8px; }

/* ---------- Connect modal ---------- */
.connect-modal {
  width: min(560px, 94vw);
  padding: 24px 26px;
}
.connect-hero {
  text-align: center;
  margin-bottom: 18px;
}
.connect-logos {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  margin-bottom: 14px;
}
.connect-logos .mark {
  width: 56px; height: 56px;
  border: 1.5px solid var(--ink);
  border-radius: 14px;
  background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Caveat'; font-weight: 700; font-size: 20px;
}
.connect-logos .conn-arrow {
  font-size: 18px; color: var(--muted);
}
.connect-modal h2 { margin: 0; font-size: 20px; font-family: 'Patrick Hand', sans-serif; }
.connect-modal .desc { margin: 6px 0 0; font-size: 13px; color: var(--muted); line-height: 1.5; }

.connect-name { margin-bottom: 14px; }
.connect-name label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.connect-name .input { width: 100%; }

.perms-block {
  background: var(--paper2);
  border: 1.5px dashed var(--muted2);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 12px;
}
.perms-block h3 { margin: 0 0 8px; font-size: 13px; color: var(--muted); font-weight: 600; }
.perms-block ul { margin: 0; padding: 0; list-style: none; }
.perms-block li { display: flex; gap: 8px; align-items: flex-start; padding: 4px 0; font-size: 13px; }
.perms-block li .check { color: var(--green); font-weight: 700; }

.copy-url {
  display: flex; gap: 6px; align-items: stretch;
  margin: 12px 0;
}
.copy-url .input { flex: 1; font-size: 12px; }
.copy-url .btn { white-space: nowrap; }

/* Webhook stepper */
.steps {
  display: flex; justify-content: space-between;
  position: relative;
  margin: 14px 4px 18px;
}
.steps::before {
  content: '';
  position: absolute; left: 16px; right: 16px; top: 14px; height: 2px;
  background: var(--muted3); z-index: 0;
}
.steps .progress {
  position: absolute; left: 16px; top: 14px; height: 2px;
  background: var(--green); z-index: 1;
  transition: width 0.2s;
}
.step-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  z-index: 2;
}
.step-node {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--ink);
  background: var(--paper);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Caveat'; font-weight: 700; font-size: 14px;
  cursor: pointer;
}
.step-item.done .step-node { background: var(--green); color: white; border-color: var(--green); }
.step-item.active .step-node { background: var(--ink); color: var(--paper); }
.step-label { font-size: 11px; color: var(--muted); }
.step-item.active .step-label { color: var(--ink); font-weight: 600; }

.step-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.slide-title { margin: 12px 0 6px; font-size: 15px; font-family: 'Patrick Hand', sans-serif; }
.slide-body { font-size: 13px; line-height: 1.55; color: var(--ink); }
.slide-body ul { margin: 8px 0; padding-left: 20px; }
.slide-body li { margin: 3px 0; }
.slide-copy { margin-top: 12px; }
.slide-copy-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }

/* API key fields */
.apikey-intro { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
.apikey-intro a { color: var(--blue); text-decoration: underline; }
.apikey-fields { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.apikey-fields li label { display: block; font-size: 13px; margin-bottom: 4px; }
.apikey-fields li label .num { color: var(--muted); margin-right: 4px; font-weight: 600; }
.apikey-fields li label .req { color: var(--red); margin-left: 2px; }
.apikey-fields li .input { width: 100%; }

.connect-foot {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1.5px dashed var(--muted2);
}
.connect-foot .actions { display: flex; gap: 8px; }

/* ---------- Instance detail modal ---------- */
.detail-modal { width: min(720px, 94vw); padding: 22px 24px; }
.detail-head { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.detail-head .brand-md { width: 48px; height: 48px; border: 1.5px solid var(--ink); border-radius: 10px; background: var(--paper2); display: flex; align-items: center; justify-content: center; font-family: 'Caveat'; font-weight: 700; font-size: 20px; }
.detail-head h2 { margin: 0; font-size: 20px; }
.detail-head .subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
.detail-tabs { display: flex; gap: 4px; margin-bottom: 14px; border-bottom: 1.5px dashed var(--muted2); }
.detail-tab { padding: 8px 12px; cursor: pointer; border: none; background: transparent; font-family: inherit; font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; }
.detail-tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }
.detail-section { margin-top: 10px; }
.detail-section h3 { margin: 0 0 8px; font-size: 14px; }
.creds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cred-field { background: var(--paper2); border: 1.5px dashed var(--muted2); border-radius: 8px; padding: 10px 12px; }
.cred-field .lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.cred-field .val { font-family: monospace; font-size: 12px; word-break: break-all; }
.danger-zone {
  margin-top: 16px; padding: 12px 14px;
  border: 1.5px dashed var(--red); border-radius: 10px;
  background: var(--red-bg, #fdecec);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.danger-zone .text { font-size: 13px; color: var(--ink); }
.danger-zone .text strong { color: var(--red); }
</style>
</head>

<main class="page-content">
  <div id="rootView"><!-- rendered by JS --></div>
</main>

<!-- Modal scaffolding -->
<div class="modal-mask" id="modalMask" role="dialog" aria-modal="true">
  <div class="modal" id="modalContent" tabindex="-1"></div>
</div>

const STORAGE_KEY = 'prototype-studio.integrations.instances';
const EVER_KEY    = 'prototype-studio.integrations.hasEverConnected';

/* ============================================================
 *  State + persistence

let instances = loadInstances();
let hasEverConnected = localStorage.getItem(EVER_KEY) === '1';

function loadInstances() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const p = JSON.parse(raw);
    return Array.isArray(p) ? p : [];
  } catch { return []; }
}
function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(instances));
  localStorage.setItem(EVER_KEY, hasEverConnected ? '1' : '0');
}
function findIntegration(id) { return INTEGRATION_CATALOG.find(i => i.id === id); }

/* ============================================================
 *  HTML helpers
 * ============================================================ */
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;' }[c]));
}
function brandSquare(integration, size) {
  const cls = size === 'lg' ? '' : 'brand-md';
  const dim = size === 'lg' ? 'width:64px;height:64px;font-size:22px;' : '';
  if (size === 'mini') {
    return '<span class="brand-mini">' + esc(integration?.logo || '?') + '</span>';
  }
  return '<span class="brand-md" style="' + dim + '">' + esc(integration?.logo || '?') + '</span>';
}
function formatDateBR(ms) {
  if (!ms) return '—';
  const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const d = new Date(ms);
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}
function lastEventFor(instanceId) {
  let h = 0;
  for (let i = 0; i < instanceId.length; i++) h = ((h << 5) - h + instanceId.charCodeAt(i)) | 0;
  const mins = (Math.abs(h) % 10080) + 1;
  if (mins < 60) return mins + ' min atrás';
  if (mins < 60*24) return Math.round(mins/60) + ' h atrás';
  return Math.round(mins/(60*24)) + ' d atrás';
}
function statusOf(inst) {
  if (!inst.active) return { variant: 'neutral', label: 'Inativa' };
  if (inst.needsAttention) return { variant: 'red', label: 'Requer atenção' };
  return { variant: 'green', label: 'Ativa' };
}

let _sortState = { by: 'name', dir: 'asc' };
let _query = '';

function renderPopulated() {
  const rows = computeRows();
  return '' +
    '<div class="page-header-row">' +
      '<div>' +
        '<h1>🔌 Integrações</h1>' +
        '<p class="sub">Conecte plataformas e ferramentas para que seus agentes coletem contexto, executem ações e mantenham seus sistemas sincronizados.</p>' +
      '</div>' +
      '<div><button class="btn" id="btnNew">+ Nova integração</button></div>' +
    '</div>' +
    '<section aria-label="Suas integrações">' +
      '<div class="section-head">' +
        '<h2>Suas integrações</h2>' +
        '<span class="count">' + rows.length + ' ' + (rows.length === 1 ? 'ativa' : 'ativas') + '</span>' +
      '</div>' +
      '<div class="toolbar-row">' +
        '<div class="search"><input class="input" id="tableSearch" placeholder="🔍 Buscar integração…" value="' + esc(_query) + '"></div>' +
        '<button class="icon-btn" title="Ordenar" id="btnSort">⇅</button>' +
        '<button class="icon-btn" title="Filtros">⚙</button>' +
      '</div>' +
      '<table class="aw-table">' +
        '<thead><tr>' +
          '<th data-sort="name">Nome ' + sortGlyph('name') + '</th>' +
          '<th data-sort="status">Status ' + sortGlyph('status') + '</th>' +
          '<th data-sort="created">Criado em ' + sortGlyph('created') + '</th>' +
          '<th data-sort="event">Último evento ' + sortGlyph('event') + '</th>' +
          '<th style="width:48px;"></th>' +
        '</tr></thead>' +
        '<tbody>' + renderRows(rows) + '</tbody>' +
      '</table>' +
    '</section>' +
    renderExplore();
}

function sortGlyph(key) {
  if (_sortState.by !== key) return '<span style="opacity:.4;">⇅</span>';
  return _sortState.dir === 'asc' ? '↑' : '↓';
}

function computeRows() {
  const dir = _sortState.dir === 'asc' ? 1 : -1;
  const q = _query.trim().toLowerCase();
  let arr = instances.map(inst => {
    const it = findIntegration(inst.integrationId);
    if (!it) return null;
    return { inst, it, createdAt: inst.addedAt || 0, event: lastEventFor(inst.instanceId) };
  }).filter(Boolean);
  if (q) arr = arr.filter(r => r.inst.name.toLowerCase().includes(q) || r.it.name.toLowerCase().includes(q));
  arr.sort((a,b) => {
    if (_sortState.by === 'name') return a.inst.name.localeCompare(b.inst.name, 'pt-BR') * dir;
    if (_sortState.by === 'status') {
      const sa = statusOf(a.inst).label, sb = statusOf(b.inst).label;
      return sa.localeCompare(sb) * dir;
    }
    if (_sortState.by === 'created') return (a.createdAt - b.createdAt) * dir;
    return a.event.localeCompare(b.event) * dir;
  });
  return arr;
}

function renderRows(rows) {
  if (!rows.length) {
    return '<tr><td colspan="5" style="padding:48px 20px;text-align:center;color:var(--muted);">' +
      (_query ? 'Nenhuma integração corresponde a "' + esc(_query) + '".' : 'Sem integrações ativas.') +
      '</td></tr>';
  }
  return rows.map(r => {
    const st = statusOf(r.inst);
    const badge = st.variant === 'green' ? 'green' : (st.variant === 'red' ? 'red' : 'yellow');
    return '<tr data-iid="' + esc(r.inst.instanceId) + '" class="' + (r.inst.active ? '' : 'row-inactive') + '">' +
      '<td><div class="cell-name">' + brandSquare(r.it) +
        '<div class="label-stack"><div class="primary">' + esc(r.inst.name) + '</div>' +
        '<div class="secondary">' + esc(r.it.name) + ' · ' + esc(AUTH_LABELS[r.it.auth]) + '</div></div></div></td>' +
      '<td><span class="badge ' + badge + '">' + esc(st.label) + '</span></td>' +
      '<td style="color:var(--muted);">' + esc(formatDateBR(r.createdAt)) + '</td>' +
      '<td style="color:var(--muted);">' + esc(r.event) + '</td>' +
      '<td><button class="kebab-btn" data-kebab="' + esc(r.inst.instanceId) + '" aria-label="Ações">⋮</button></td>' +
    '</tr>';
  }).join('');
}

function renderExplore() {
  const cards = EXPLORE_BRAND_IDS.map(id => {
    const it = findIntegration(id);
    return '<button class="explore-card" data-pick="' + id + '">' + brandSquare(it) +
      '<div class="body"><div class="title">' + esc(it.name) + '</div>' +
      '<div class="desc">' + esc(it.desc) + '</div></div></button>';
  }).join('');
  return '<div class="explore-wrap">' +

        '<div class="brand-md" style="background:var(--paper3);">⚏</div>' +
        '<div class="body"><div class="title">Ver todas</div>' +

      '</button>' +

}

function wirePopulated() {
  document.getElementById('btnNew').onclick = openAddModal;
  document.getElementById('btnSeeAll').onclick = openAddModal;
  document.getElementById('seeAllCard').onclick = openAddModal;
  document.querySelectorAll('.explore-card[data-pick]').forEach(c => {
    c.onclick = () => handleExplorePick(c.dataset.pick);
  });

  const search = document.getElementById('tableSearch');
  if (search) {
    search.oninput = (e) => {
      _query = e.target.value;
      const tbody = document.querySelector('.aw-table tbody');
      tbody.innerHTML = renderRows(computeRows());
      bindRows();
    };
  }
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.onclick = () => {
      const key = th.dataset.sort;
      if (_sortState.by === key) _sortState.dir = _sortState.dir === 'asc' ? 'desc' : 'asc';
      else _sortState = { by: key, dir: key === 'name' ? 'asc' : 'desc' };
      render();
    };
  });
  document.getElementById('btnSort').onclick = () => {
    _sortState.dir = _sortState.dir === 'asc' ? 'desc' : 'asc';
    render();
  };
  bindRows();
}

function bindRows() {
  document.querySelectorAll('tr[data-iid]').forEach(tr => {
    tr.onclick = (e) => {
      if (e.target.closest('[data-kebab]')) return;
      openDetailModal(tr.dataset.iid);
    };
  });
  document.querySelectorAll('[data-kebab]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      openKebab(btn);
    };
  });
}

function handleExplorePick(id) {
  const has = instances.some(i => i.integrationId === id);
  if (has) {
    showExistsModal(id);
  } else {
    openConnectModal(id);
  }
}

/* ============================================================
 *  Kebab menu
 * ============================================================ */
let _openKebab = null;
function openKebab(anchor) {
  if (_openKebab) { _openKebab.remove(); _openKebab = null; }
  const iid = anchor.dataset.kebab;
  const inst = instances.find(i => i.instanceId === iid);
  if (!inst) return;
  const menu = document.createElement('div');
  menu.className = 'kebab-menu';
  menu.innerHTML = '' +
    '<button data-act="toggle">' + (inst.active ? '⏸ Pausar integração' : '▶ Ativar integração') + '</button>' +
    '<button data-act="configure">⚙ Ver detalhes</button>' +
    '<button data-act="rename">✎ Renomear</button>' +
    '<button data-act="attention">' + (inst.needsAttention ? '✓ Limpar erro' : '⚠ Simular erro') + '</button>' +
    '<div class="sep"></div>' +
    '<button data-act="disconnect" class="danger">⛓ Desconectar</button>';
  const r = anchor.getBoundingClientRect();
  menu.style.top = (window.scrollY + r.bottom + 4) + 'px';
  menu.style.left = (window.scrollX + r.right - 200) + 'px';
  document.body.appendChild(menu);
  _openKebab = menu;
  menu.querySelectorAll('button[data-act]').forEach(b => {
    b.onclick = () => {
      const act = b.dataset.act;
      menu.remove(); _openKebab = null;
      if (act === 'toggle') {
        instances = instances.map(i => i.instanceId === iid ? { ...i, active: !i.active } : i);
        persist(); render();
      } else if (act === 'configure') {
        openDetailModal(iid);
      } else if (act === 'rename') {
        const cur = inst.name;
        const next = window.prompt('Novo nome da integração:', cur);
        if (next && next.trim()) {
          instances = instances.map(i => i.instanceId === iid ? { ...i, name: next.trim() } : i);
          persist(); render();
        }
      } else if (act === 'attention') {
        instances = instances.map(i => {
          if (i.instanceId !== iid) return i;
          if (i.needsAttention) { const c = { ...i }; delete c.needsAttention; return c; }
          return { ...i, needsAttention: true };
        });
        persist(); render();
      } else if (act === 'disconnect') {
        showDisconnectConfirm(iid);
      }
    };
  });
  setTimeout(() => {
    document.addEventListener('click', closeKebabHandler, { once: true });
  }, 0);
}
function closeKebabHandler() { if (_openKebab) { _openKebab.remove(); _openKebab = null; } }

            '<div><div class="name">Integração personalizada</div></div></div>' +
          '<div class="desc">Conecte qualquer API: defina endpoint, autenticação e mapeamento.</div>' +
        '</button>'
      ) : '') +

  }

  return '' +
    '<header class="add-int-head">' +
      '<div class="title-row"><div class="ico">🧩</div><h2>Adicionar integração</h2></div>' +
      '<button class="btn ghost small" data-close="1" aria-label="Fechar">✕</button>' +

}

function wireAddModal() {
  const root = document.getElementById('modalContent');
  root.querySelectorAll('[data-close]').forEach(b => b.onclick = () => closeModal('modalMask'));
  root.querySelectorAll('[data-cat]').forEach(b => {
    b.onclick = () => { _addCat = b.dataset.cat; refreshAddModal(); };
  });
  const search = document.getElementById('addSearch');
  if (search) {
    search.oninput = (e) => { _addQuery = e.target.value; refreshAddModal(true); };
  }
  root.querySelectorAll('[data-pick]').forEach(b => {
    b.onclick = () => {
      const id = b.dataset.pick;
      closeModal('modalMask');
      setTimeout(() => openConnectModal(id), 80);
    };
  });
  root.querySelectorAll('[data-custom]').forEach(b => {
    b.onclick = () => {
      closeModal('modalMask');
      setTimeout(openCustomConfirm, 80);
    };
  });
}
function refreshAddModal(keepFocus) {
  const root = document.getElementById('modalContent');
  root.innerHTML = buildAddModal();
  wireAddModal();
  if (keepFocus) {
    const s = document.getElementById('addSearch');
    if (s) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
  }
}

/* ============================================================
 *  Connect modal — branches by auth kind
 * ============================================================ */
let _connectStep = 0;
let _connectId = null;

function openConnectModal(integrationId) {
  const it = findIntegration(integrationId);
  if (!it) return;
  _connectId = integrationId;
  _connectStep = 0;
  showModal('modalMask', 'modalContent', buildConnectModal(it), 'connect-modal');
  wireConnectModal();
}

function buildConnectModal(it) {
  const defaultName = it.name + ' ' + (instances.filter(i => i.integrationId === it.id).length + 1);
  const logos = '' +
    '<div class="connect-logos">' +
      '<div class="mark">F</div>' +
      '<span class="conn-arrow">⇄</span>' +
      '<div class="mark">' + esc(it.logo) + '</div>' +
    '</div>';

  let titleText;
  if (it.auth === 'webhook') titleText = 'Integrar ' + it.name;
  else if (it.auth === 'apiKey') titleText = 'Conectar ' + it.name;
  else titleText = 'Conectar Fyntra para ' + it.name;

  const hero = '<div class="connect-hero">' + logos + '<h2>' + esc(titleText) + '</h2>' +
    '<p class="desc">' + esc(it.desc) + '</p></div>';

  const nameField = '<div class="connect-name"><label>Nome</label>' +
    '<input class="input" id="connName" placeholder="' + esc(defaultName) + '" value="' + esc(defaultName) + '"></div>';

  let body = '';
  if (it.auth === 'oauth') body = buildOAuthBody(it);
  else if (it.auth === 'webhook') body = buildWebhookBody(it);
  else body = buildApiKeyBody(it);

  const isWebhook = it.auth === 'webhook';
  const steps = isWebhook ? webhookSteps(it) : [];
  const lastStep = !isWebhook || _connectStep >= steps.length - 1;
  const primaryLabel = isWebhook
    ? (lastStep ? 'Concluir configuração' : 'Continuar →')
    : (it.auth === 'apiKey' ? 'Conectar' : 'Permitir acesso');

  const backBtn = (isWebhook && _connectStep > 0)
    ? '<button class="btn ghost" data-back="1">← Voltar</button>'
    : '<span></span>';

  const foot = '<footer class="connect-foot">' + backBtn +
    '<div class="actions">' +
      '<button class="btn secondary" data-close="1">Cancelar</button>' +
      '<button class="btn" id="connectPrimary">' + esc(primaryLabel) + '</button>' +
    '</div></footer>';

  const close = '<button class="btn ghost small" data-close="1" style="position:absolute;top:14px;right:14px;" aria-label="Fechar">✕</button>';
  return '<div style="position:relative;">' + close + hero + nameField + body + foot + '</div>';
}

function buildOAuthBody(it) {
  const perms = (it.permissions || []).map(p => '<li><span class="check">✓</span><span>' + esc(p) + '</span></li>').join('');
  const redirect = 'https://app.awsales.io/integrations/' + it.id + '/callback';
  return '' +
    (perms ? '<div class="perms-block"><h3>O AwSales precisa</h3><ul>' + perms + '</ul></div>' : '') +
    '<div class="copy-url"><input class="input" readonly value="' + esc(redirect) + '">' +
      '<button class="btn secondary" data-copy="' + esc(redirect) + '">📋 Copiar link</button></div>';
}

function buildApiKeyBody(it) {
  return '' +
    '<p class="apikey-intro">Adicione abaixo as credenciais da sua conta ' + esc(it.name) + '. ' +
      'Para ver o passo a passo de como encontrar as informações, ' +
      '<a href="https://' + esc(it.domain) + '" target="_blank" rel="noreferrer">clique aqui</a>.</p>' +
    '<ol class="apikey-fields">' +
      '<li><label><span class="num">1.</span>Insira o clientId<span class="req">*</span></label>' +
        '<input class="input" placeholder="Insira aqui seu ClientId"></li>' +
      '<li><label><span class="num">2.</span>Insira o Client Secret<span class="req">*</span></label>' +
        '<input class="input" placeholder="Insira aqui seu Client Secret"></li>' +
      '<li><label><span class="num">3.</span>Insira o basic token<span class="req">*</span></label>' +
        '<input class="input" placeholder="Insira aqui seu basic token"></li>' +
    '</ol>';
}

function buildWebhookBody(it) {
  const steps = webhookSteps(it);
  const stepCount = steps.length;
  const progress = stepCount <= 1 ? 0 : (_connectStep / (stepCount - 1)) * 100;
  const cur = steps[_connectStep];
  const nodes = steps.map((s, i) => {
    const state = i < _connectStep ? 'done' : (i === _connectStep ? 'active' : 'todo');
    const label = state === 'done' ? '✓' : (i + 1);
    return '<div class="step-item ' + state + '">' +
      '<div class="step-node">' + label + '</div>' +
      '<div class="step-label">' + esc(s.label) + '</div></div>';
  }).join('');

  let copyBlock = '';
  if (cur.copy) {
    copyBlock = '<div class="slide-copy"><span class="slide-copy-label">' + esc(cur.copy.label) + '</span>' +
      '<div class="copy-url"><input class="input" readonly value="' + esc(cur.copy.value) + '">' +
        '<button class="btn secondary" data-copy="' + esc(cur.copy.value) + '">📋 Copiar link</button></div></div>';
  }

  return '' +
    '<div class="step-meta"><span>Etapa ' + (_connectStep + 1) + ' de ' + stepCount + '</span><span>' + esc(cur.label) + '</span></div>' +
    '<div class="steps">' +
      '<span class="progress" style="width:calc(' + progress + '% - 16px);"></span>' +
      nodes +
    '</div>' +
    '<h4 class="slide-title">' + esc(cur.title) + '</h4>' +
    '<div class="slide-body">' + cur.body + copyBlock + '</div>';
}

function webhookSteps(it) {
  const url = 'https://app.awsales.io/api/webhooks/checkouts/' + it.id + '-d12fa78b3e4c4a1f';
  return [
    {
      label: 'Copiar',
      title: 'Copie o webhook',
      body: '<p>Copie o link abaixo. Ele será utilizado na configuração do ' + esc(it.name) + '.</p>',
      copy: { label: 'Webhook URL', value: url },
    },
    {
      label: 'Configurar',
      title: 'Acesse o ' + it.name,
      body: '<p>No painel do ' + esc(it.name) + ', abra <strong>Webhooks → Novo webhook</strong> e preencha:</p>' +
        '<ul><li><strong>Nome:</strong> Integração AwSales</li>' +
        '<li><strong>URL:</strong> cole o webhook copiado na etapa anterior</li>' +
        '<li><strong>Eventos:</strong> Fatura Criada, Fatura Paga, Fatura Reembolsada, Carrinho Abandonado e Pagamento Falhou</li></ul>',
    },
    {
      label: 'Salvar',
      title: 'Salve a configuração',
      body: '<p>Após ajustar todas as configurações, garanta que o webhook foi salvo e aparece como <strong>Ativo</strong> no painel do ' + esc(it.name) + '.</p>',
    },
    {
      label: 'Testar',
      title: 'Faça um teste',
      body: '<p>O ' + esc(it.name) + ' oferece a opção <em>Testar configuração</em> na tela de edição do webhook. Use essa opção — nosso sistema verifica se a integração foi realizada com sucesso.</p>',
    },
  ];
}

function wireConnectModal() {
  const root = document.getElementById('modalContent');
  root.querySelectorAll('[data-close]').forEach(b => b.onclick = () => closeModal('modalMask'));
  root.querySelectorAll('[data-back]').forEach(b => b.onclick = () => {
    _connectStep = Math.max(0, _connectStep - 1);
    const it = findIntegration(_connectId);
    root.innerHTML = buildConnectModal(it);
    wireConnectModal();
  });
  root.querySelectorAll('[data-copy]').forEach(b => {
    b.onclick = async () => {
      const val = b.dataset.copy;
      try { await navigator.clipboard.writeText(val); b.textContent = '✓ Copiado'; setTimeout(() => b.textContent = '📋 Copiar link', 1500); } catch {}
    };
  });
  document.getElementById('connectPrimary').onclick = () => {
    const it = findIntegration(_connectId);
    if (it.auth === 'webhook') {
      const steps = webhookSteps(it);
      if (_connectStep < steps.length - 1) {
        _connectStep++;
        root.innerHTML = buildConnectModal(it);
        wireConnectModal();
        return;
      }
    }
    finalizeConnect(it);
  };
}

function finalizeConnect(it) {
  const name = (document.getElementById('connName')?.value || '').trim() ||
    (it.name + ' ' + (instances.filter(i => i.integrationId === it.id).length + 1));
  const now = Date.now();
  instances = [...instances, {
    instanceId: it.id + '-' + now,
    integrationId: it.id,
    name,
    active: true,
    addedAt: now,
  }];
  hasEverConnected = true;
  persist();
  closeModal('modalMask');
  render();
}

/* ============================================================
 *  Existing-conexão modal (já conectado)
 * ============================================================ */
function showExistsModal(integrationId) {
  const it = findIntegration(integrationId);
  showModal('modalMask', 'modalContent',
    '<h2>' + esc(it.name) + ' já está conectado</h2>' +
    '<p class="note" style="margin-top:8px;">Você já tem ao menos uma conexão de <strong>' + esc(it.name) + '</strong>. Quer ver e gerenciar as conexões existentes, ou conectar uma nova conta?</p>' +
    '<div class="row gap-sm" style="margin-top:18px;justify-content:flex-end;">' +
      '<button class="btn secondary" data-close="1">👁 Ver existentes</button>' +
      '<button class="btn" id="anotherBtn">+ Conectar outra conta</button>' +
    '</div>',
    ''
  );
  document.querySelectorAll('#modalContent [data-close]').forEach(b => b.onclick = () => closeModal('modalMask'));
  document.getElementById('anotherBtn').onclick = () => { closeModal('modalMask'); setTimeout(() => openConnectModal(integrationId), 80); };
}

/* ============================================================
 *  Custom-integration confirm
 * ============================================================ */
function openCustomConfirm() {
  showModal('modalMask', 'modalContent',
    '<h2>Criar integração personalizada?</h2>' +
    '<p class="note" style="margin-top:8px;">Você vai abrir a configuração de uma <strong>integração personalizada via webhook</strong>. É preciso definir um nome único, gerar um endpoint e enviar eventos no formato esperado pelo AwSales. Nada é criado até você concluir a configuração — quer continuar?</p>' +
    '<div class="row gap-sm" style="margin-top:18px;justify-content:flex-end;">' +
      '<button class="btn secondary" data-back-to-add="1">Cancelar</button>' +
      '<button class="btn" id="customGo">Continuar →</button>' +
    '</div>',
    ''
  );
  document.querySelector('[data-back-to-add]').onclick = () => { closeModal('modalMask'); setTimeout(openAddModal, 80); };
  document.getElementById('customGo').onclick = () => {
    closeModal('modalMask');
    // simula criação de instância custom (webhook)
    const now = Date.now();
    instances = [...instances, {
      instanceId: 'custom-' + now,
      integrationId: 'custom',
      name: 'Personalizada ' + (instances.filter(i => i.integrationId === 'custom').length + 1),
      active: true,
      addedAt: now,
    }];
    // adiciona ad-hoc no catálogo se ainda não existe
    if (!findIntegration('custom')) {
      INTEGRATION_CATALOG.push({ id: 'custom', cat: 'checkouts', name: 'Personalizada', logo: '＋', domain: '', desc: 'Integração personalizada via webhook.', auth: 'webhook' });
    }
    hasEverConnected = true;
    persist(); render();
  };
}

/* ============================================================
 *  Disconnect confirm
 * ============================================================ */
function showDisconnectConfirm(iid) {
  const inst = instances.find(i => i.instanceId === iid);
  if (!inst) return;
  showModal('modalMask2', 'modalContent2',
    '<h2>Desconectar integração</h2>' +
    '<p class="note" style="margin-top:8px;">Tem certeza que deseja desconectar <strong>' + esc(inst.name) + '</strong>? Os agentes vão perder o acesso aos dados e ações dessa ferramenta. Você pode reconectar depois a qualquer momento.</p>' +
    '<div class="row gap-sm" style="margin-top:18px;justify-content:flex-end;">' +
      '<button class="btn secondary" data-close2="1">Cancelar</button>' +
      '<button class="btn" id="confirmDisc">⛓ Desconectar</button>' +
    '</div>',
    ''
  );
  document.querySelectorAll('#modalContent2 [data-close2]').forEach(b => b.onclick = () => closeModal('modalMask2'));
  document.getElementById('confirmDisc').onclick = () => {
    instances = instances.filter(i => i.instanceId !== iid);
    persist();
    closeModal('modalMask2');
    render();
  };
}

/* ============================================================
 *  Detail modal (instance config)
 * ============================================================ */
function openDetailModal(iid) {
  const inst = instances.find(i => i.instanceId === iid);
  if (!inst) return;
  const it = findIntegration(inst.integrationId);
  if (!it) return;

  const created = formatDateBR(inst.addedAt || 0);
  const status = statusOf(inst);
  const badge = status.variant === 'green' ? 'green' : (status.variant === 'red' ? 'red' : 'yellow');
  const webhookUrl = 'https://app.awsales.io/api/webhooks/' + it.cat + '/' + iid;

  let credsBlock = '';
  if (it.auth === 'apiKey') {
    credsBlock = '<div class="creds-grid">' +
      '<div class="cred-field"><div class="lbl">Client ID</div><div class="val">' + esc(it.id) + '_••••••••8b3e</div></div>' +
      '<div class="cred-field"><div class="lbl">Client Secret</div><div class="val">sk_•••••••••••••f4a1</div></div>' +
    '</div>';
  } else if (it.auth === 'oauth') {
    credsBlock = '<div class="creds-grid">' +
      '<div class="cred-field"><div class="lbl">Access token</div><div class="val">oauth_••••••••••a1f</div></div>' +
      '<div class="cred-field"><div class="lbl">Refresh token</div><div class="val">refresh_••••••••e4c</div></div>' +
    '</div>';
  } else {
    credsBlock = '<div class="cred-field"><div class="lbl">Webhook URL (entrada)</div><div class="val">' + esc(webhookUrl) + '</div></div>';
  }

  const html = '' +
    '<button class="btn ghost small" data-close-detail="1" style="position:absolute;top:14px;right:14px;" aria-label="Fechar">✕</button>' +
    '<div class="detail-head">' + brandSquare(it) +
      '<div style="flex:1;">' +
        '<h2>' + esc(inst.name) + '</h2>' +
        '<div class="subtitle">' + esc(it.name) + ' · ' + esc(CATEGORY_LABELS[it.cat]) + ' · ' + esc(AUTH_LABELS[it.auth]) + '</div>' +
      '</div>' +
      '<span class="badge ' + badge + '">' + esc(status.label) + '</span>' +
    '</div>' +
    '<div class="detail-tabs">' +
      '<button class="detail-tab active">Visão</button>' +
      '<button class="detail-tab">Permissões</button>' +
      '<button class="detail-tab">Eventos</button>' +
      '<button class="detail-tab">Logs</button>' +
    '</div>' +
    '<div class="detail-section">' +
      '<h3>Credenciais</h3>' + credsBlock +
    '</div>' +
    '<div class="detail-section">' +
      '<h3>Detalhes da conexão</h3>' +
      '<div class="creds-grid">' +
        '<div class="cred-field"><div class="lbl">Criada em</div><div class="val">' + esc(created) + '</div></div>' +
        '<div class="cred-field"><div class="lbl">Último evento</div><div class="val">' + esc(lastEventFor(iid)) + '</div></div>' +
        '<div class="cred-field"><div class="lbl">Instance ID</div><div class="val">' + esc(iid) + '</div></div>' +
        '<div class="cred-field"><div class="lbl">Domínio</div><div class="val">' + esc(it.domain || '—') + '</div></div>' +
      '</div>' +
    '</div>' +
    '<div class="detail-section">' +
      '<h3>Ações</h3>' +
      '<div class="row gap-sm" style="margin-top:8px;">' +
        '<button class="btn secondary small" id="detRename">✎ Renomear</button>' +
        '<button class="btn ghost small" id="detToggle">' + (inst.active ? '⏸ Pausar' : '▶ Ativar') + '</button>' +
        '<button class="btn ghost small" id="detCopy">📋 Copiar webhook URL</button>' +
      '</div>' +
    '</div>' +
    '<div class="danger-zone">' +
      '<div class="text"><strong>Desconectar</strong> — agentes perderão acesso. Reconectável depois.</div>' +
      '<button class="btn" style="background:var(--red);" id="detDisc">⛓ Desconectar</button>' +
    '</div>';

  showModal('modalMask', 'modalContent', html, 'detail-modal');
  const root = document.getElementById('modalContent');
  root.querySelector('[data-close-detail]').onclick = () => closeModal('modalMask');
  document.getElementById('detRename').onclick = () => {
    const cur = inst.name;
    const next = window.prompt('Novo nome da integração:', cur);
    if (next && next.trim()) {
      instances = instances.map(i => i.instanceId === iid ? { ...i, name: next.trim() } : i);
      persist(); closeModal('modalMask'); render();
    }
  };
  document.getElementById('detToggle').onclick = () => {
    instances = instances.map(i => i.instanceId === iid ? { ...i, active: !i.active } : i);
    persist(); closeModal('modalMask'); render();
  };
  document.getElementById('detCopy').onclick = async () => {
    try { await navigator.clipboard.writeText(webhookUrl); document.getElementById('detCopy').textContent = '✓ Copiado'; } catch {}
  };
  document.getElementById('detDisc').onclick = () => { closeModal('modalMask'); setTimeout(() => showDisconnectConfirm(iid), 80); };
  root.querySelectorAll('.detail-tab').forEach(t => t.onclick = () => {
    root.querySelectorAll('.detail-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
}

/* ============================================================
 *  Modal infra (genérico)
 * ============================================================ */
function showModal(maskId, contentId, html, extraClass) {
  const mask = document.getElementById(maskId);
  const content = document.getElementById(contentId);
  content.className = 'modal' + (extraClass ? ' ' + extraClass : ' lg');
  content.innerHTML = html;
  mask.classList.add('show');
  setTimeout(() => content.focus?.(), 50);
}
function closeModal(maskId) {
  document.getElementById(maskId).classList.remove('show');
}
document.getElementById('modalMask').addEventListener('click', e => { if (e.target.id === 'modalMask') closeModal('modalMask'); });
document.getElementById('modalMask2').addEventListener('click', e => { if (e.target.id === 'modalMask2') closeModal('modalMask2'); });

/* ============================================================
 *  Dev seed — botão "Reset estado" pra facilitar QA (não aparece em prod)
 * ============================================================ */
(function injectDevHelpers() {
  if (window.location.search.includes('reset=1')) {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(EVER_KEY);
    instances = []; hasEverConnected = false;
  }
})();

/* Boot */
render();
</script>
