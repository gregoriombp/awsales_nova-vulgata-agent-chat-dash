<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>AwSales — Protótipo Primeiro Login</title>
<link rel="stylesheet" href="../assets/shell.css">
<style>
/* === estilos específicos do fluxo de primeiro login === */
/* Compatibilidade: o CSS antigo usava --line; mapear pro --ink do shell. */
:root { --line: var(--ink); }

/* FRAME do convite (público sem sidebar) */
.frame {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  max-width: 860px;
  width: 100%;
  overflow: hidden;
  margin: 0 auto;
}

.frame-header {
  padding: 20px 28px 14px;
  border-bottom: 1px dashed var(--muted2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo-aw {
  font-family: 'Caveat', cursive;
  font-size: 26px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}
.logo-aw::before { content: "✦"; color: var(--orange); }

.stepper {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--muted);
}
.stepper .dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  background: var(--paper);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
}
.stepper .dot.done { background: var(--ink); color: var(--paper); }
.stepper .dot.active { background: var(--orange); color: var(--paper); }
.stepper .label.done, .stepper .label.active { color: var(--ink); font-weight: 600; }
.stepper .conn { color: var(--muted2); }

.frame-body { padding: 28px; }

.welcome-card {
  border: 1.5px solid var(--line);
  border-radius: 10px;
  background: var(--paper2);
  padding: 20px;
  margin: 12px 0;
}

.org-card {
  border: 1px solid var(--muted2);
  border-radius: 8px;
  padding: 12px 14px;
  background: var(--paper);
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0;
}
.org-icon {
  width: 40px; height: 40px;
  border-radius: 8px;
  background: var(--blue);
  color: var(--paper);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: 'Caveat', cursive;
  font-size: 24px;
  font-weight: 700;
}
.org-name { font-weight: 600; }
.org-meta { color: var(--muted); font-size: 13px; }

/* Bloco de revisão — sobrescreve um pouco o .block do shell pra layout interno */
.block h3 { margin-bottom: 8px; font-size: 22px; display: flex; align-items: center; gap: 8px; }
.block .row-pair {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 4px 12px;
  font-size: 15px;
  margin: 4px 0;
}
.block .row-pair .label { color: var(--muted); }
.block .badge-warn {
  display: inline-block;
  background: var(--yellow-bg);
  color: var(--yellow);
  border: 1px solid var(--yellow);
  border-radius: 12px;
  padding: 2px 10px;
  font-size: 12px;
  margin-top: 6px;
}

/* Big Number (F4.1 NOTA: não implementado na story v5, mas exibido aqui como sugestão) */
.big-number-banner {
  display: none; /* habilitado por opção */
  border: 2px solid var(--ink);
  background: var(--green-bg);
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 14px;
}

/* Variantes extras do .btn que não vêm no shell */
.btn.danger { background: var(--red); border-color: var(--red); color: var(--paper); }

.btn-row {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}

/* Campo de formulário */
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 4px;
}

/* Radio cards (escolha de método de pagamento, 2FA, etc.) */
.radio-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin: 10px 0;
}
.radio-card {
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 12px;
  background: var(--paper);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.radio-card.active {
  background: var(--green-bg);
  border-color: var(--green);
  box-shadow: var(--shadow-sm);
}
.radio-card .icon { font-size: 22px; }
.radio-card .title { font-weight: 600; }
.radio-card .desc { font-size: 12px; color: var(--muted); }

/* Chips de e-mail */
.chips-input {
  border: 1.5px solid var(--line);
  border-radius: 6px;
  background: var(--paper);
  padding: 6px;
  min-height: 60px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: flex-start;
}
.chip {
  background: var(--paper2);
  border: 1px solid var(--muted2);
  border-radius: 14px;
  padding: 3px 10px;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.chip .x { cursor: pointer; opacity: 0.6; }
.chips-input input {
  border: none;
  outline: none;
  flex: 1;
  min-width: 160px;
  padding: 4px;
  background: transparent;
  font-family: inherit;
  font-size: 14px;
}
.chips-counter { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* QR code mock */
.qr-mock {
  width: 180px; height: 180px;
  background: repeating-linear-gradient(45deg, var(--ink) 0 6px, var(--paper) 6px 12px);
  border: 2px solid var(--ink);
  border-radius: 6px;
  display: inline-block;
}
.qr-mock.lg { width: 220px; height: 220px; }

/* Termo de uso */
.terms-doc {
  border: 1.5px solid var(--line);
  background: var(--paper2);
  border-radius: 8px;
  padding: 16px;
  height: 280px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.6;
}
.terms-doc h4 { font-family: 'Patrick Hand'; font-size: 16px; margin-top: 14px; margin-bottom: 4px; }
.terms-progress {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
  font-size: 13px;
  color: var(--muted);
}
.terms-progress .bar {
  flex: 1;
  height: 8px;
  background: var(--paper2);
  border: 1px solid var(--muted2);
  border-radius: 4px;
  overflow: hidden;
}
.terms-progress .bar .fill {
  height: 100%;
  background: var(--green);
  width: 0%;
  transition: width 0.2s;
}

/* TOTP code */
.totp-input {
  display: flex;
  gap: 6px;
  margin: 8px 0;
}
.totp-input input {
  width: 40px; height: 50px;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  text-align: center;
  font-size: 22px;
  background: var(--paper);
  font-family: inherit;
}

/* Side-by-side (2FA setup) */
.split-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* Telas de sucesso/erro final */
.success-icon {
  width: 80px; height: 80px;
  margin: 0 auto 16px;
  background: var(--green);
  color: var(--paper);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  border: 2px solid var(--line);
}
.error-icon { background: var(--red); }
.warn-icon { background: var(--yellow); }

.summary-card {
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 14px 18px;
  background: var(--paper2);
  max-width: 420px;
  margin: 16px auto;
  text-align: left;
}
.summary-card .row {
  justify-content: space-between;
  padding: 4px 0;
}

/* Contact card no modal "Algo está errado?" */
.contact-card {
  border: 1px solid var(--muted2);
  border-radius: 8px;
  padding: 12px;
  background: var(--paper2);
  margin: 10px 0;
}

.text-right { text-align: right; }
.mb-2 { margin-bottom: 12px; }
.mt-3 { margin-top: 16px; }

/* Modal: específico aqui — modal do fluxo é menor que o padrão do shell */
.modal-mask .modal { max-width: 500px; padding: 24px; }
.modal h3 { margin-bottom: 8px; }
.modal .modal-body { margin: 14px 0; }

@media (max-width: 720px) {
  .split-2 { grid-template-columns: 1fr; }
  .frame-body { padding: 18px; }
}

</style>
</head>

     data-layout="centered"

<script>
const screens = [

/* Nav interna do fluxo — o shell.js já cria o demo-nav global no topo.
   Aqui mantemos só uma navegação secundária inline pra saltar entre as 23 telas do fluxo. */
function renderInnerNav() {
  const host = document.getElementById('innerNav');
  if (!host) return;
  let currentGroup = '';
  let html = '';
  screens.forEach(s => {
    if (s.group !== currentGroup) {
      html += `<span class="group-label">${s.group}</span>`;
      currentGroup = s.group;
    }
    html += `<button data-id="${s.id}" onclick="navigate('${s.id}')">${s.name}</button>`;
  });
  host.innerHTML = html;
}

function navigate(id) {
  location.hash = id;
  render();
}

/* Finaliza o onboarding e leva pra Início do Studio.
 * Chamado pelos botões "Entrar agora" das telas de sucesso (W10A, W6B, W10MO). */
function enterStudio() {
  window.location.href = 'inicio.html';
}

/* Auto-redirect 3s nas telas que prometem "Redirecionando em 3s…".
 * Cancelado se o user clicar em qualquer botão antes (incluindo "Entrar agora",
 * que já vai pro destino) ou navegar pra outra tela. */
let _autoRedirectTimer = null;
function scheduleAutoRedirect() {
  clearTimeout(_autoRedirectTimer);
  _autoRedirectTimer = setTimeout(enterStudio, 3000);
}
function cancelAutoRedirect() {
  clearTimeout(_autoRedirectTimer);
  _autoRedirectTimer = null;
}
window.addEventListener('hashchange', cancelAutoRedirect);

function setActive(id) {
  document.querySelectorAll('#innerNav button').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalMask').classList.add('show');
}
function closeModal() {
  document.getElementById('modalMask').classList.remove('show');
}
document.getElementById('modalMask').addEventListener('click', e => {
  if (e.target.id === 'modalMask') closeModal();
});

/* --------- COMPONENTES REUSÁVEIS --------- */
function logoHeader(stepActive, label) {
  const steps = ['Revisão','Pagamento','Conta','Convidar time'];
  const idx = ['rev','pay','acc','inv'].indexOf(stepActive);
  let dots = '';
  steps.forEach((s, i) => {
    let cls = i < idx ? 'done' : (i === idx ? 'active' : '');
    let lab = cls;
    dots += `<span class="dot ${cls}">${i < idx ? '✓' : i+1}</span><span class="label ${lab}">${s}</span>`;
    if (i < steps.length-1) dots += '<span class="conn">───</span>';
  });
  return `
    <div class="frame-header">
      <div class="logo-aw">AwSales</div>
      <div class="stepper">${dots}</div>
    </div>
  `;
}

function logoHeaderMinimal(passText) {
  return `
    <div class="frame-header">
      <div class="logo-aw">AwSales</div>
      <div class="stepper">${passText || ''}</div>
    </div>
  `;
}

function setPayMethod(el, m) {
  document.querySelectorAll('#payMethods .radio-card').forEach(c => c.classList.remove('active'));

  'w1-mo': renderW1MO, 'w3-mo': renderW3MO, 'w10-mo': renderW10MO,
};

/* Telas de sucesso final do onboarding — disparam auto-redirect 3s pro Studio
 * (a UI promete "Redirecionando em 3 segundos…"). */
const SUCCESS_SCREENS = new Set(['w10-a', 'w6-b', 'w10-mo']);

function render() {
  const id = (location.hash || '#w1-a').slice(1);
  const fn = renderers[id] || renderW1A;
  const html = fn();
  document.getElementById('stage').innerHTML = `<div class="frame">${html}</div>`;
  setActive(id);
  window.scrollTo(0, 0);
  if (SUCCESS_SCREENS.has(id)) scheduleAutoRedirect();
  else cancelAutoRedirect();
}

window.addEventListener('hashchange', render);
render();
