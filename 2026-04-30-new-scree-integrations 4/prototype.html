<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Studio · Awsales — Protótipo Integrações + Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Architects+Daughter&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f1e8;
  --paper: #fdfaf3;
  --paper2: #f9f4ea;
  --ink: #1a1a1a;
  --ink-soft: #2a2a2a;
  --line: #1a1a1a;
  --muted: #6b6b6b;
  --muted2: #8b8580;
  --green: #2f7a35;
  --green-bg: #d4ebd4;
  --green-soft: #c8e0c8;
  --yellow: #b8870e;
  --yellow-bg: #f8e5a8;
  --red: #b03838;
  --red-bg: #f5d4d4;
  --blue: #3257b8;
  --blue-bg: #d4dff5;
  --orange: #c46818;
  --shadow-sm: 1px 1px 0 rgba(0,0,0,0.08);
  --shadow-md: 2px 2px 0 rgba(0,0,0,0.12);
  --shadow-lg: 3px 3px 0 rgba(0,0,0,0.18);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Patrick Hand', 'Architects Daughter', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.4;
}

h1, h2, h3, .script {
  font-family: 'Caveat', cursive;
  font-weight: 600;
  color: var(--ink);
}

button, input, textarea, select {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ======================================================================
   LAYOUT
   ====================================================================== */

#app {
  display: flex;
  min-height: 100vh;
}

.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--bg);
  border-bottom: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
}

.topbar .brand {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  font-weight: 600;
}

.topbar .org-switcher {
  border: 1.5px solid var(--line);
  border-radius: 18px;
  padding: 4px 14px;
  font-size: 14px;
  cursor: pointer;
  background: var(--paper);
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
}

.topbar .org-switcher .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
  display: none;
}
.topbar .org-switcher.dirty .dot { display: block; }

.sidebar {
  width: 200px;
  background: var(--bg);
  border-right: 1.5px solid var(--line);
  padding: 76px 0 16px 0;
  position: fixed;
  top: 0; bottom: 0;
  overflow-y: auto;
}

.sidebar nav {
  padding: 0 16px;
}

.sidebar nav .item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 4px;
  color: var(--ink-soft);
  margin-bottom: 2px;
}
.sidebar nav .item:hover {
  background: var(--paper);
}
.sidebar nav .item.active {
  font-weight: 600;
}
.sidebar nav .item .arrow {
  font-size: 10px;
  color: var(--muted);
}
.sidebar nav .sub {
  padding-left: 18px;
  font-size: 14px;
  color: var(--muted);
  margin-top: 2px;
  margin-bottom: 4px;
}
.sidebar nav .sub.active { color: var(--ink); font-weight: 600; }

.main {
  margin-left: 200px;
  padding: 76px 32px 48px 32px;
  flex: 1;
  min-width: 0;
}

.page {
  max-width: 1200px;
}

.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}

.page-header h1 {
  font-family: 'Caveat', cursive;
  font-size: 38px;
  font-weight: 600;
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.page-header h1 .meta {
  font-family: 'Patrick Hand', sans-serif;
  font-size: 15px;
  color: var(--muted);
  font-weight: 400;
}

.note {
  font-family: 'Architects Daughter', cursive;
  color: var(--muted);
  font-size: 13px;
  font-style: italic;
  margin: 6px 0;
}

/* ======================================================================
   COMPONENTES
   ====================================================================== */

.btn {
  border: 1.5px solid var(--line);
  background: var(--ink);
  color: var(--paper);
  padding: 8px 16px;
  border-radius: 22px;
  cursor: pointer;
  font-size: 15px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--shadow-sm);
  transition: transform 0.05s;
}
.btn:hover { transform: translate(-1px, -1px); box-shadow: var(--shadow-md); }
.btn:active { transform: translate(1px, 1px); box-shadow: none; }

.btn.secondary {
  background: var(--paper);
  color: var(--ink);
}

.btn.ghost {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--line);
  box-shadow: none;
}

.btn.danger {
  background: var(--red);
  color: var(--paper);
  border-color: var(--red);
}

.btn.small {
  padding: 4px 10px;
  font-size: 13px;
  border-radius: 16px;
}

.btn-link {
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--blue);
  text-decoration: underline;
  padding: 0;
  font-size: 14px;
}

.btn-icon {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 14px;
}

.input, .textarea, .select {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 15px;
  width: 100%;
  font-family: inherit;
}

.textarea {
  min-height: 100px;
  resize: vertical;
}

.search {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 26px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.search input {
  border: none;
  background: transparent;
  outline: none;
  flex: 1;
  font-size: 15px;
}

.toggle-view {
  border: 1.5px solid var(--line);
  border-radius: 6px;
  display: flex;
  background: var(--paper);
}
.toggle-view button {
  padding: 6px 10px;
  background: transparent;
  border: none;
  cursor: pointer;
}
.toggle-view button.active {
  background: var(--ink);
  color: var(--paper);
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 2px 10px;
  border-radius: 12px;
  border: 1.5px solid var(--line);
  font-size: 13px;
  background: var(--paper);
}

.chip.green { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.chip.yellow { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
.chip.red { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.chip.blue { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }

.dot-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.dot-status.green { background: var(--green); }
.dot-status.yellow { background: var(--yellow); }
.dot-status.red { background: var(--red); }
.dot-status.gray { background: var(--muted); }
.dot-status.blue { background: var(--blue); }

.notif-badge {
  position: absolute;
  top: -8px;
  right: -8px;
  background: var(--red);
  color: white;
  border: 1.5px solid var(--paper);
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
}

.banner {
  background: var(--blue-bg);
  border: 1.5px solid var(--blue);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.banner.warning { background: var(--yellow-bg); border-color: var(--yellow); }
.banner.error { background: var(--red-bg); border-color: var(--red); }
.banner.success { background: var(--green-bg); border-color: var(--green); }

.banner .text { flex: 1; }
.banner .icon { font-size: 18px; }

.connection-card {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  position: relative;
  transition: transform 0.05s;
  box-shadow: var(--shadow-sm);
  min-height: 200px;
  display: flex;
  flex-direction: column;
}
.connection-card:hover {
  transform: translate(-1px, -1px);
  box-shadow: var(--shadow-md);
}
.connection-card .card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 12px;
}
.connection-card .logo {
  width: 36px;
  height: 36px;
  border: 1.5px solid var(--line);
  border-radius: 6px;
  background: var(--paper2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 18px;
}
.connection-card .name {
  font-family: 'Caveat', cursive;
  font-size: 24px;
  font-weight: 600;
  line-height: 1;
}
.connection-card .category {
  font-size: 12px;
  color: var(--muted);
  font-style: italic;
}
.connection-card .conn-list {
  flex: 1;
  list-style: none;
}
.connection-card .conn-list li {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
  font-size: 14px;
}
.connection-card .stat-row {
  border-top: 1px dashed var(--muted);
  margin-top: 8px;
  padding-top: 8px;
  font-size: 13px;
  color: var(--muted);
}
.connection-card .reconnect-link {
  color: var(--blue);
  font-size: 14px;
  margin-top: 8px;
}
.connection-card .notif-count {
  position: absolute;
  top: -10px;
  right: -10px;
  background: var(--red);
  color: white;
  border: 2px solid var(--bg);
  border-radius: 50%;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}

.grid-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  gap: 18px;
}

/* Modal */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  z-index: 1000;
  padding: 60px 20px;
  overflow-y: auto;
}
.modal {
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: 12px;
  width: 100%;
  max-width: 700px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  overflow: hidden;
}
.modal-head {
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-head h2 {
  font-family: 'Caveat', cursive;
  font-size: 28px;
}
.modal-body {
  padding: 20px;
}
.modal-foot {
  padding: 14px 20px;
  border-top: 1.5px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Drawer */
.drawer-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 1000;
  display: flex;
  justify-content: flex-end;
}
.drawer {
  background: var(--paper);
  border-left: 2px solid var(--line);
  width: 480px;
  max-width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  box-shadow: -4px 0 0 rgba(0,0,0,0.1);
}
.drawer-head {
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.drawer-body {
  padding: 20px;
  flex: 1;
}
.drawer-foot {
  padding: 14px 20px;
  border-top: 1.5px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  color: var(--ink-soft);
}
.field .hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  font-style: italic;
}

/* Detail page */
.detail-header {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  box-shadow: var(--shadow-sm);
}
.detail-header .left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.detail-header .actions {
  display: flex;
  gap: 8px;
}
.detail-header h2 {
  font-family: 'Caveat', cursive;
  font-size: 30px;
  font-weight: 600;
  line-height: 1;
}

.breadcrumb {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 12px;
}
.breadcrumb a { color: var(--muted); }
.breadcrumb .sep { margin: 0 6px; }
.breadcrumb .current { color: var(--ink); }

.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1.5px solid var(--line);
  margin-bottom: 16px;
}
.tabs .tab {
  padding: 10px 18px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-size: 15px;
  border-bottom: 3px solid transparent;
  margin-bottom: -1.5px;
  color: var(--muted);
}
.tabs .tab.active {
  border-bottom-color: var(--ink);
  color: var(--ink);
  font-weight: 600;
}

.section {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.section h3 {
  font-size: 22px;
  margin-bottom: 12px;
}

.kv {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 10px 16px;
  font-size: 15px;
}
.kv .k { color: var(--muted); }

/* Lateral list (sidebar dentro do detalhe) */
.split-detail {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 16px;
}
.conn-sidebar {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 12px;
  height: fit-content;
}
.conn-sidebar h4 {
  font-size: 13px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}
.conn-sidebar .item {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  margin-bottom: 4px;
}
.conn-sidebar .item.active {
  background: var(--paper2);
  border: 1.5px solid var(--line);
  font-weight: 600;
}
.conn-sidebar .item small {
  color: var(--muted);
  font-size: 12px;
  display: block;
}

/* Tabela */
table.data {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
table.data thead th {
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1.5px solid var(--line);
  color: var(--muted);
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
table.data thead th .sortable {
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
table.data tbody td {
  padding: 10px 12px;
  border-bottom: 1px dashed #ccc;
}
table.data tbody tr:hover { background: var(--paper2); cursor: pointer; }
table.data tbody tr.selected { background: var(--paper2); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
}
.empty-state h2 {
  font-size: 32px;
  margin-bottom: 12px;
}
.empty-state .icon-big {
  font-size: 56px;
  margin-bottom: 16px;
}

.checklist {
  list-style: none;
}
.checklist li {
  padding: 4px 0;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.checklist li.done { color: var(--green); text-decoration: line-through; }

.url-box {
  background: var(--bg);
  border: 1.5px dashed var(--muted);
  border-radius: 6px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  word-break: break-all;
}
.url-box .copy-btn {
  flex-shrink: 0;
}

/* Badges com forma irregular (estilo handsketch) */
.pill {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 14px;
  font-size: 12px;
  border: 1.5px solid var(--line);
  background: var(--paper);
}

/* Split pane (W16) */
.split-pane {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  height: calc(100vh - 200px);
}
.split-pane > div {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 18px;
  overflow-y: auto;
  box-shadow: var(--shadow-sm);
}

.collapsible {
  border: 1px solid var(--muted);
  border-radius: 6px;
  margin-bottom: 12px;
  overflow: hidden;
  background: var(--paper);
}
.collapsible summary {
  padding: 10px 14px;
  cursor: pointer;
  background: var(--paper2);
  font-weight: 600;
  font-size: 14px;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.collapsible summary::after {
  content: '▼';
  font-size: 10px;
  color: var(--muted);
}
.collapsible[open] summary::after {
  content: '▲';
}
.collapsible .content {
  padding: 12px 14px;
}

/* Code-like block */
.code {
  background: #f0ebde;
  border: 1px solid var(--muted);
  border-radius: 6px;
  padding: 12px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  white-space: pre;
  overflow-x: auto;
}

/* HEADER actions row */
.toolbar-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 12px 0 16px 0;
  flex-wrap: wrap;
}

/* Atalhos cards (W11 vars fixas + templates em massa) */
.shortcut-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 18px;
}
.shortcut-card {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow-sm);
}
.shortcut-card:hover {
  transform: translate(-1px, -1px);
  box-shadow: var(--shadow-md);
}
.shortcut-card .icon {
  font-size: 26px;
  flex-shrink: 0;
}
.shortcut-card .arrow {
  margin-left: auto;
  font-size: 18px;
  color: var(--muted);
}
.shortcut-card .body h4 {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 2px;
}
.shortcut-card .body p {
  color: var(--muted);
  font-size: 13px;
}

/* Affordances no header do W3 */
.affordance-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 18px;
}
.affordance {
  background: var(--paper2);
  border: 1.5px dashed var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  cursor: pointer;
  text-align: left;
}
.affordance:hover {
  background: var(--paper);
  border-style: solid;
  box-shadow: var(--shadow-sm);
}
.affordance h4 {
  font-family: 'Caveat', cursive;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 2px;
}
.affordance p {
  color: var(--muted);
  font-size: 13px;
}

/* Filters bar */
.filters-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.filters-bar .filter {
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 16px;
  padding: 5px 12px;
  font-size: 13px;
  cursor: pointer;
}
.filters-bar .filter.active {
  background: var(--ink);
  color: var(--paper);
}

/* Provider catalog cards */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
}
.cat-card {

  if (conn.health === 'unreachable') return `<span class="chip red"><span class="dot-status red"></span>inacessível</span>`;
  if (conn.health === 'degraded') return `<span class="chip yellow"><span class="dot-status yellow"></span>degradada</span>`;
  return `<span class="chip green"><span class="dot-status green"></span>ativo</span>`;
}

function statusChipsDetail(conn) {
  // D-DET3: chips SEPARADOS no detalhe da conexão (Status interno × Saúde × Meta)
  if (!conn) return '';
  let chips = [];

  // Status interno
  const sLabel = ({active:'Ativo', expired:'Expirou', revoked:'Revogada', error:'Erro', pending_auth:'Aguardando auth'})[conn.status];
  const sClass = conn.status === 'active' ? 'green' : (conn.status === 'pending_auth' ? 'yellow' : 'red');
  chips.push(`<span class="chip ${sClass}" title="Status interno"><span class="dot-status ${sClass}"></span>${sLabel}</span>`);

  // Saúde (separado de status)
  if (conn.health) {
    const hLabel = ({healthy:'saúde OK', degraded:'saúde degradada', unreachable:'inacessível'})[conn.health];
    const hClass = conn.health === 'healthy' ? 'green' : (conn.health === 'degraded' ? 'yellow' : 'red');
    chips.push(`<span class="chip ${hClass}" title="Saúde"><span class="dot-status ${hClass}"></span>${hLabel}</span>`);
  }

  return chips.join(' ');
}

function statusChipsWaba(w) {
  // D-DET3 + WABA: 3 chips separados
  let chips = [];
  chips.push(`<span class="chip green" title="Status interno"><span class="dot-status green"></span>Ativo</span>`);
  chips.push(`<span class="chip green" title="Saúde"><span class="dot-status green"></span>healthy</span>`);
  if (w.metaStatus === 'rejected') {
    chips.push(`<span class="chip red" title="Status na Meta"><span class="dot-status red"></span>Meta Rejected</span>`);
  } else if (w.metaStatus === 'pending') {
    chips.push(`<span class="chip yellow" title="Status na Meta"><span class="dot-status yellow"></span>Meta Pending review</span>`);
  } else {
    chips.push(`<span class="chip green" title="Status na Meta"><span class="dot-status green"></span>Meta Approved</span>`);
  }
  // Quality rating
  const qLabel = ({high:'qual. ALTA', medium:'qual. MED', low:'qual. BAIXA'})[w.quality];
  const qClass = w.quality === 'high' ? 'green' : (w.quality === 'medium' ? 'yellow' : 'red');
  chips.push(`<span class="chip ${qClass}" title="Quality rating Meta"><span class="dot-status ${qClass}"></span>${qLabel}</span>`);
  return chips.join(' ');
}

function showToast(msg) {
  const t = el(`<div class="toast">${msg}</div>`);
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function openModal(content) {
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `<div class="modal-bg" onclick="if(event.target===this) closeOverlay()">
    <div class="modal">${content}</div>
  </div>`;
}

function openDrawer(content) {
  const overlay = document.getElementById('overlay');
  overlay.innerHTML = `<div class="drawer-bg" onclick="if(event.target===this) closeOverlay()">
    <div class="drawer">${content}</div>
  </div>`;
}

function closeOverlay() {
  document.getElementById('overlay').innerHTML = '';
}

function setDirty(v) {
  state.dirtyForm = v;
  document.getElementById('orgSwitcher').classList.toggle('dirty', v);
}

/* =============================================================================
   ROUTING
   ============================================================================= */

function navigate(route) {
  if (state.dirtyForm) {
    showDirtyStateModal(() => {
      state.dirtyForm = false;
      setDirty(false);
      window.location.hash = route;
    });
    return;
  }
  window.location.hash = route;
}

function currentRoute() {
  return window.location.hash || '#/integrations';
}

function highlightSidebar() {
  const r = currentRoute();
  document.querySelectorAll('.sidebar nav .item, .sidebar nav .sub').forEach(el => {
    el.classList.remove('active');
    if (el.dataset.route && r.startsWith(el.dataset.route)) {
      el.classList.add('active');
    }
  });
}

/* =============================================================================
   VIEWS
   ============================================================================= */

function renderView() {
  highlightSidebar();
  const r = currentRoute();
  const view = document.getElementById('view');

  if (r === '#/integrations' || r === '') {
    view.innerHTML = renderIntegrations();
    bindIntegrations();
  } else if (r.startsWith('#/integrations/legacy')) {
    view.innerHTML = renderLegacyMigration();
    bindLegacy();
  } else if (r === '#/canais') {
    view.innerHTML = renderCanaisList();
    bindCanaisList();
  } else if (r.startsWith('#/canais/whatsapp')) {
    if (r === '#/canais/whatsapp') {
      view.innerHTML = renderWhatsAppList();
      bindWhatsAppList();
    } else {
      view.innerHTML = renderWabaDetail();
      bindWabaDetail();
    }
  } else if (r.startsWith('#/integrations/')) {
    view.innerHTML = renderConnectionDetail();
    bindConnectionDetail();
  } else if (r === '#/tools') {
    view.innerHTML = renderToolsGlobal();
    bindToolsGlobal();
  } else if (r.startsWith('#/tools/new')) {
    view.innerHTML = renderToolBuilder();
    bindToolBuilder();
  } else if (r === '#/telemetry') {
    view.innerHTML = renderTelemetry();
    bindTelemetry();
  } else if (r === '#/visao' || r === '#/campanha' || r === '#/conversas' || r === '#/conhecimento' || r === '#/agentes' || r === '#/otimizacao') {
    view.innerHTML = renderPlaceholder(r);
  } else {
    view.innerHTML = renderIntegrations();
    bindIntegrations();
  }
}

    `;
  } else {
    main = `

        <div class="left">
          <div class="logo">${p.logo}</div>

// Helpers de telemetria agregada
function toolMasterState(t) {
  // Retorna 'on' / 'off' / 'mixed' baseado nas contas
  const enabled = t.accounts.filter(a => a.enabled).length;
  if (enabled === 0) return 'off';
  if (enabled === t.accounts.length) return 'on';
  return 'mixed';
}
function toolTotalExec(t) {
  return t.accounts.reduce((sum, a) => sum + (a.exec30d || 0), 0);
}
function providerLogo(connName) {
  const map = {'Hotmart': '🔥', 'Stripe': '🛒', 'HubSpot': '🔶', 'Pipedrive': '🔧', 'Gourmet API': '🌐'};
  return map[connName] || '🌐';
}

function renderToolsGlobal() {
  const filter = state.toolsFilter || 'todas';
  let visibleTools = state.tools;
  if (filter === 'nativas') visibleTools = state.tools.filter(t => t.origin === 'native' || t.origin === 'platform');
  if (filter === 'personalizadas') visibleTools = state.tools.filter(t => t.origin === 'custom');

  // Agrupa por provider (conn) → cada provider tem N contas → cada conta tem M tools
  const byProvider = {};
  visibleTools.forEach(t => {
    byProvider[t.conn] = byProvider[t.conn] || {};
    t.accounts.forEach(a => {
      byProvider[t.conn][a.name] = byProvider[t.conn][a.name] || [];
      byProvider[t.conn][a.name].push({ tool: t, account: a });
    });
  });

  const totalAll = state.tools.length;
  const totalNative = state.tools.filter(t => t.origin === 'native' || t.origin === 'platform').length;
  const totalCustom = state.tools.filter(t => t.origin === 'custom').length;

  // Renderiza hierarquia: source > conta > tools
  const providersHtml = Object.entries(byProvider).map(([connName, accounts]) => {
    const isProviderExpanded = state.toolsExpanded[connName] !== false;
    const desc = state.providerDescriptions[connName] || 'Endpoints HTTP personalizados.';
    const accountNames = Object.keys(accounts);
    const totalToolsAcrossAccounts = Object.values(accounts).reduce((s, arr) => s + arr.length, 0);
    const totalEnabledAcrossAccounts = Object.values(accounts).reduce((s, arr) => s + arr.filter(x => x.account.enabled).length, 0);

    return `
      <div class="skill-group">
        <div class="skill-group-head" data-group="${connName}">
          <div class="logo" style="font-size:18px">${providerLogo(connName)}</div>
          <div class="flex-1">
            <div class="bold" style="font-size:18px">${connName}</div>
            <div class="muted small">${desc}</div>
          </div>
          <div class="muted small text-center" style="margin-right:12px">
            <div class="bold" style="color:var(--ink)">${accountNames.length} conta${accountNames.length>1?'s':''}</div>
            <div>${totalEnabledAcrossAccounts}/${totalToolsAcrossAccounts} habilidades ativas</div>
          </div>
          <span class="muted" style="font-size:18px;margin-left:8px">${isProviderExpanded ? '⌃' : '⌄'}</span>
        </div>

        ${isProviderExpanded ? accountNames.map(accName => renderAccountRow(connName, accName, accounts[accName])).join('') : ''}
      </div>
    `;
  }).join('');

  return `
    <div class="page">
      <div class="page-header">
        <h1>🛠 Habilidades</h1>
        <div class="row gap-sm">
          <button class="btn ghost" onclick="navigate('#/telemetry')">📊 Telemetria & Logs</button>
          <button class="btn ghost" onclick="navigate('#/integrations')">⊞ Gerenciar integrações</button>
          <button class="btn" onclick="openPickIntegrationModal()">+ Nova habilidade personalizada</button>
        </div>
      </div>

      <p class="muted" style="max-width:680px;margin-bottom:24px">
        Navegue por <strong>integração → conta → habilidades</strong>. Aqui você liga/desliga e configura.
        Pra ver execuções, latência, custo e logs, abra
        <a onclick="navigate('#/telemetry')">Telemetria & Logs →</a>
      </p>

      <hr class="divider-dashed">

      <div class="row between mt-3 mb-3">
        <div class="filter-tabs">
          <button class="filter-tab ${filter==='todas'?'active':''}" data-tfilter="todas">Todas <span class="muted">${totalAll}</span></button>
          <button class="filter-tab ${filter==='nativas'?'active':''}" data-tfilter="nativas">Nativas <span class="muted">${totalNative}</span></button>
          <button class="filter-tab ${filter==='personalizadas'?'active':''}" data-tfilter="personalizadas">Personalizadas <span class="muted">${totalCustom}</span></button>
        </div>
        <div class="row gap-sm">
          <div class="search" style="width:280px"><span>🔍</span><input placeholder="Buscar habilidade..."></div>
          <select class="select" style="width:auto"><option>Todas as integrações ▼</option></select>
        </div>
      </div>

      <div class="skill-groups">
        ${providersHtml || '<p class="muted text-center" style="padding:40px">Nenhuma habilidade nesse filtro.</p>'}
      </div>
    </div>
  `;
}

// Renderiza nível 2 (conta dentro do provider) com seus tools dentro
function renderAccountRow(providerName, accountName, toolPairs) {
  const accountKey = `${providerName}/${accountName}`;
  const isAccountExpanded = state.accountsExpanded[accountKey] !== false;
  const enabled = toolPairs.filter(x => x.account.enabled).length;
  const total = toolPairs.length;
  const accStatus = toolPairs.some(x => x.account.status === 'missing_scope');

  return `
    <div class="account-node">
      <div class="account-node-head" data-account="${accountKey}">
        <span class="account-icon">📌</span>
        <div class="flex-1">
          <div class="bold small">${accountName}</div>
          <div class="muted tiny">${enabled}/${total} habilidades ativas ${accStatus ? '· ⚠ scope insuf. em algumas' : ''}</div>
        </div>
        <span class="muted tiny" style="margin-right:8px">${enabled}/${total}</span>
        <button class="btn small ghost" data-new-in-acc="${providerName}|${accountName}" onclick="event.stopPropagation()" title="Criar habilidade nesta conta — tool herda credencial dela">+ Nova</button>
        <span class="muted small" style="margin-left:8px">${isAccountExpanded ? '⌃' : '⌄'}</span>
      </div>

      ${isAccountExpanded ? toolPairs.map(({tool, account}) => `
        <div class="tool-row" data-tool-account="${tool.id}|${account.name}">
          <div class="skill-icon" style="margin-left:24px">${tool.icon || '⚡'}</div>
          <div class="flex-1">
            <div class="bold small">${tool.name}</div>
            <div class="muted tiny">${tool.desc}</div>
          </div>
          <span class="chip ${tool.cat==='read'?'green':tool.cat==='action'?'blue':'yellow'}">${tool.cat==='read'?'Leitura':tool.cat==='action'?'Ação':tool.cat}</span>
          ${account.status === 'missing_scope'
            ? '<span class="chip yellow tiny">⚠ scope insuf.</span>'
            : `<button class="toggle-switch ${account.enabled ? 'on' : ''}" data-toggle-tool-acc="${tool.id}|${account.name}" onclick="event.stopPropagation()"><span></span></button>`}
        </div>
      `).join('') : ''}
    </div>
  `;
}

// Render de uma habilidade-mestre (linha) com expansão de contas
function renderToolMasterRow(t) {
  const masterState = toolMasterState(t);
  const totalAccs = t.accounts.length;
  const enabledAccs = t.accounts.filter(a => a.enabled).length;
  const totalExec = toolTotalExec(t);
  const isInconsistent = masterState === 'mixed';
  const isDrillOpen = state.toolsDrillExpanded[t.id] === true;
  const showAccountsRow = totalAccs > 1; // só mostra drill-down se >1 conta

  // Stats agregadas
  const enabledAccounts = t.accounts.filter(a => a.enabled);
  const avgP95 = enabledAccounts.length
    ? Math.round(enabledAccounts.reduce((s, a) => s + (a.p95 || 0), 0) / enabledAccounts.length)
    : null;

  const masterToggleClass = masterState === 'on' ? 'on' : (masterState === 'mixed' ? 'mixed' : '');

  return `
    <div class="skill-row" data-tool="${t.id}" style="${isInconsistent ? 'border-left: 3px solid var(--yellow);' : ''}">
      <div class="skill-icon">${t.icon || '⚡'}</div>
      <div class="flex-1">
        <div class="row gap-sm" style="align-items:baseline">
          <div class="bold">${t.name}</div>
          ${isInconsistent ? '<span class="chip yellow tiny">⚠ inconsistência cross-conta</span>' : ''}
        </div>
        <div class="muted small">${t.desc}</div>
        ${showAccountsRow ? `
          <div class="muted tiny mt-2">
            <strong>${enabledAccs}/${totalAccs} contas ativas</strong>
            · ${totalExec.toLocaleString('pt-BR')} exec/30d
            ${avgP95 ? `· p95 médio ${avgP95}ms` : ''}
            ${t.accounts.some(a => a.cost) ? '· custo: R$ ' + t.accounts.reduce((s,a) => s + parseFloat((a.cost||'R$ 0').replace('R$','').trim()), 0).toFixed(0) : ''}
          </div>
        ` : `
          <div class="muted tiny mt-2">
            ${t.accounts[0].exec30d.toLocaleString('pt-BR')} exec/30d
            · p95 ${t.accounts[0].p95 || '—'}ms
            · err ${t.accounts[0].errorRate || 0}%
            ${t.accounts[0].cost ? '· ' + t.accounts[0].cost : ''}
          </div>
        `}
      </div>
      <span class="chip ${t.cat==='read'?'green':t.cat==='action'?'blue':'yellow'}">${t.cat==='read'?'Leitura':t.cat==='action'?'Ação':t.cat}</span>
      <button class="toggle-switch ${masterToggleClass}" data-toggle-master="${t.id}" onclick="event.stopPropagation()" title="${masterState === 'mixed' ? 'Mixed (clique pra ligar/desligar todas)' : ''}"><span></span></button>
      ${showAccountsRow ? `
        <button class="btn-icon" data-drill="${t.id}" onclick="event.stopPropagation()" style="margin-left:6px" title="${isDrillOpen ? 'Recolher contas' : 'Expandir contas'}">${isDrillOpen ? '▴' : '▾'}</button>
      ` : ''}
    </div>

    ${(showAccountsRow && isDrillOpen) ? renderAccountsDrillDown(t) : ''}
  `;
}

function renderAccountsDrillDown(t) {
  return `
    <div class="account-drill">
      <table class="account-drill-table">
        <thead>
          <tr>
            <th></th>
            <th>Conta</th>
            <th>Exec 30d</th>
            <th>p95</th>
            <th>Erros</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${t.accounts.map((a, i) => `
            <tr>

              <td><strong>${a.name}</strong></td>

          `).join('')}

}

function bindToolsGlobal() {
  // Tabs Todas/Nativas/Personalizadas
  document.querySelectorAll('[data-tfilter]').forEach(b => b.addEventListener('click', () => {
    state.toolsFilter = b.dataset.tfilter;
    renderView();
  }));
  // Provider expandir/colapsar (nível 1)
  document.querySelectorAll('[data-group]').forEach(g => g.addEventListener('click', () => {
    const name = g.dataset.group;
    state.toolsExpanded[name] = state.toolsExpanded[name] === false ? true : false;
    renderView();
  }));
  // Conta expandir/colapsar (nível 2)
  document.querySelectorAll('[data-account]').forEach(a => a.addEventListener('click', () => {
    const key = a.dataset.account;
    state.accountsExpanded[key] = state.accountsExpanded[key] === false ? true : false;
    renderView();
  }));
  // Toggle de tool dentro de uma conta específica
  document.querySelectorAll('[data-toggle-tool-acc]').forEach(t => t.addEventListener('click', e => {
    e.stopPropagation();
    const [toolId, accName] = t.dataset.toggleToolAcc.split('|');
    const tool = TOOL(toolId);
    if (tool) {
      const acc = tool.accounts.find(a => a.name === accName);
      if (acc && acc.status !== 'missing_scope') acc.enabled = !acc.enabled;
    }
    renderView();
  }));
  // Click no tool-row → abre drawer detalhe (sem telemetria/audit — vai pra outra tela)
  document.querySelectorAll('[data-tool-account]').forEach(r => r.addEventListener('click', e => {
    if (e.target.closest('[data-toggle-tool-acc]')) return;
    const [toolId, accName] = r.dataset.toolAccount.split('|');
    openToolDrawer(toolId, accName);
  }));
  // Botão "+ Nova" no header de cada conta — atalho contextual: tool herda credencial DAQUELA conta
  document.querySelectorAll('[data-new-in-acc]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const [provider, account] = b.dataset.newInAcc.split('|');

  if (f.account !== 'all') filteredInstances = filteredInstances.filter(i => i.account.name === f.account);
  if (f.tool !== 'all') filteredInstances = filteredInstances.filter(i => i.tool.name === f.tool);

  // Lista de providers/contas/tools pra dropdown
  const providers = [...new Set(state.tools.map(t => t.conn))];

  const toolNames = [...new Set(state.tools.map(t => t.name))];

  // KPIs filtrados
  const totalExec = filteredInstances.reduce((s, i) => s + (i.account.exec30d || 0), 0);
  const enabled = filteredInstances.filter(i => i.account.enabled).length;
  const totalCost = filteredInstances
    .filter(i => i.account.cost)
    .reduce((s, i) => s + parseFloat((i.account.cost || 'R$ 0').replace('R$', '').trim()), 0);
  const enabledWithLatency = filteredInstances.filter(i => i.account.enabled && i.account.p95);
  const avgP95 = enabledWithLatency.length
    ? Math.round(enabledWithLatency.reduce((s, i) => s + i.account.p95, 0) / enabledWithLatency.length)
    : 0;
  const enabledWithErr = filteredInstances.filter(i => i.account.enabled && i.account.errorRate != null);

function generateMockLogs(instances, count) {
  const statuses = ['success', 'success', 'success', 'success', 'success', 'success', 'success', 'success', 'success', 'error', 'timeout'];
  const errMsgs = ['Upstream timeout', 'Provider returned 503', 'Token expired', 'Rate limit exceeded', 'Invalid response schema'];
  const errCodes = ['504', '503', '401', '429', '422'];
  const now = Date.now();

  return Array.from({length: count}, (_, i) => {
    if (instances.length === 0) return null;
    const inst = instances[i % instances.length];
    const status = statuses[(i * 7 + 3) % statuses.length];
    const isErr = status === 'error';
    const minutesAgo = i * 7 + (i % 13);
    const ts = new Date(now - minutesAgo * 60 * 1000).toISOString().slice(0, 19).replace('T', ' ');
    return {
      id: `log_${i}`,
      ts,
      tool: inst.tool.name,
      account: inst.account.name,
      status,
      code: isErr ? errCodes[i % errCodes.length] : null,
      message: isErr ? errMsgs[i % errMsgs.length] : null,
      latency: 50 + ((i * 17) % 400),
      requestId: 'req_' + Math.random().toString(36).slice(2, 10),
    };
  }).filter(Boolean);
}

function openLogDrawer(logId) {
  showToast(`Drawer com payload completo (request/response/headers) do log ${logId}`);

// Tab Telemetria (charts, latência, custo)
function renderToolDrawerTelemetry(t) {
  const totalExec = toolTotalExec(t);
  const enabledAccs = t.accounts.filter(a => a.enabled);
  const avgP95 = enabledAccs.length
    ? Math.round(enabledAccs.reduce((s, a) => s + (a.p95 || 0), 0) / enabledAccs.length)
    : 0;
  const avgErr = enabledAccs.length
    ? (enabledAccs.reduce((s, a) => s + (a.errorRate || 0), 0) / enabledAccs.length).toFixed(2)
    : '0';
  const totalCostNum = t.accounts
    .filter(a => a.cost)
    .reduce((s, a) => s + parseFloat((a.cost || 'R$ 0').replace('R$', '').trim()), 0);

  // Mock: gerar dados de execuções por dia (30 dias)
  const seed = (t.id.charCodeAt(0) + t.id.charCodeAt(1)) % 100;
  const days = Array.from({length: 30}, (_, i) => {
    const base = totalExec / 30;
    const noise = ((seed + i * 17) % 30) / 30;
    return Math.round(base * (0.5 + noise));
  });
  const maxDay = Math.max(...days, 1);

  return `
      <div class="kpi-strip mt-3 mb-3" style="grid-template-columns:repeat(4,1fr)">
        <div class="kpi small-kpi">
          <div class="kpi-label">Exec 30d</div>
          <div class="kpi-value">${totalExec.toLocaleString('pt-BR')}</div>
        </div>
        <div class="kpi small-kpi">
          <div class="kpi-label">p95 latência</div>
          <div class="kpi-value">${avgP95}<span class="kpi-sub">ms</span></div>
        </div>
        <div class="kpi small-kpi">
          <div class="kpi-label">Error rate</div>
          <div class="kpi-value">${avgErr}<span class="kpi-sub">%</span></div>
        </div>
        <div class="kpi small-kpi">
          <div class="kpi-label">Custo 30d</div>
          <div class="kpi-value">${totalCostNum > 0 ? 'R$ ' + totalCostNum.toFixed(0) : '—'}</div>
        </div>
      </div>

      <div class="field">
        <label>Execuções por dia (últimos 30 dias)</label>
        <div class="bar-chart">
          ${days.map((d, i) => `
            <div class="bar" style="height: ${(d/maxDay) * 100}%" title="dia ${i+1}: ${d} exec"></div>
          `).join('')}
        </div>
        <div class="row between mt-2 muted tiny">
          <span>30d atrás</span>
          <span>hoje</span>
        </div>
      </div>

      <hr class="divider-dashed">

      <div class="field">
        <label>Por conta</label>
        <table class="data" style="font-size:13px">
          <thead><tr><th>Conta</th><th>Exec</th><th>p95</th><th>Erros</th></tr></thead>
          <tbody>
            ${t.accounts.map(a => `
              <tr>
                <td><strong>${a.name}</strong></td>
                <td>${(a.exec30d || 0).toLocaleString('pt-BR')}</td>
                <td>${a.p95 ? a.p95+'ms' : '—'}</td>
                <td>${a.errorRate != null ? a.errorRate+'%' : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      ${totalCostNum > 0 ? `
        <hr class="divider-dashed">
        <div class="banner small">
          <span class="icon">💰</span>
          <div class="text">
            Custo total mês: <strong>R$ ${totalCostNum.toFixed(2)}</strong> (provider externo).
            <a onclick="showToast('Watchtower abre dashboard de custo agregado')">Ver detalhamento no Watchtower →</a>
          </div>
        </div>
      ` : ''}
  `;
}
